function recalcAthForm(liftId) {
  var kgEl = document.getElementById('afkg-' + liftId);
  var rpEl = document.getElementById('afrp-' + liftId);
  var resEl = document.getElementById('af1rm-' + liftId);
  if (!kgEl || !rpEl || !resEl) return;
  var oneRM = calcOneRM(parseFloat(kgEl.value)||0, parseFloat(rpEl.value)||0);
  resEl.innerHTML = oneRM > 0 ? '<b>' + oneRM + '</b><span> 1RM</span>' : '—';
}

function saveAthForm(id) {
  var nameEl = document.getElementById('ath-fname');
  var wcEl = document.getElementById('ath-fwc');
  var fdEl = document.getElementById('ath-ffight');
  if (!nameEl || !nameEl.value.trim()) { alert('Inserisci il nome dell\'atleta'); return; }
  var lifts = {};
  ATH_LIFTS.forEach(function(l) {
    var kg = parseFloat((document.getElementById('afkg-'+l.id)||{}).value)||0;
    var reps = parseFloat((document.getElementById('afrp-'+l.id)||{}).value)||0;
    if (kg > 0 && reps > 0) lifts[l.id] = {kg:kg, reps:reps, oneRM:calcOneRM(kg,reps), date:new Date().toLocaleDateString('it-IT')};
  });
  var fightDate = fdEl ? fdEl.value : '';
  var targetEl = document.getElementById('ath-ftarget');
  var targetWeight = targetEl && targetEl.value ? parseFloat(targetEl.value) : null;
  var athletes = getAthletes();
  if (id === 'new') {
    athletes.push({id:'ath_'+Date.now(), name:nameEl.value.trim(), weightClass:(wcEl?wcEl.value.trim():''), fightDate:fightDate, targetWeight:targetWeight, weightLog:[], lifts:lifts, lastTest:Object.keys(lifts).length>0?new Date().toLocaleDateString('it-IT'):''});
  } else {
    var i = athletes.findIndex(function(a){return a.id===id;});
    if (i !== -1) {
      athletes[i].name = nameEl.value.trim();
      athletes[i].weightClass = wcEl ? wcEl.value.trim() : '';
      athletes[i].fightDate = fightDate;
      athletes[i].targetWeight = targetWeight;
      if (Object.keys(lifts).length > 0) {
        if (athletes[i].lifts && Object.keys(athletes[i].lifts).length > 0) {
          if (!athletes[i].history) athletes[i].history = [];
          athletes[i].history.unshift({date: athletes[i].lastTest || new Date().toLocaleDateString('it-IT'), lifts: JSON.parse(JSON.stringify(athletes[i].lifts))});
          if (athletes[i].history.length > 10) athletes[i].history = athletes[i].history.slice(0,10);
        }
        athletes[i].lifts = lifts; athletes[i].lastTest = new Date().toLocaleDateString('it-IT');
      }
    }
  }
  saveAthletes(athletes);
  athEditId = null;
  renderAthPanelContent();
}

function deleteAthlete(id) {
  var ath = getAthletes().find(function(a){return a.id===id;});
  if (!ath) return;
  if (!confirm('Eliminare il profilo di ' + ath.name + '?')) return;
  saveAthletes(getAthletes().filter(function(a){return a.id!==id;}));
  if (localStorage.getItem('evian_active_ath') === id) localStorage.removeItem('evian_active_ath');
  renderAthPanelContent();
}

function daysSinceTest(lastTestStr) {
  if (!lastTestStr) return null;
  var parts = lastTestStr.split('/');
  if (parts.length < 3) return null;
  try {
    var d = new Date(parseInt(parts[2], 10), parseInt(parts[1], 10)-1, parseInt(parts[0], 10));
    return Math.floor((new Date() - d) / (1000*60*60*24));
  } catch(e) { return null; }
}

function addWeightLog(athId, kgStr) {
  var kg = parseFloat(kgStr);
  if (!kg || kg < 30 || kg > 250) { alert('Peso inválido'); return; }
  var athletes = getAthletes();
  var i = athletes.findIndex(function(a){return a.id===athId;});
  if (i === -1) return;
  if (!athletes[i].weightLog) athletes[i].weightLog = [];
  var today = new Date().toISOString().slice(0,10);
  athletes[i].weightLog = athletes[i].weightLog.filter(function(e){return e.date !== today;});
  athletes[i].weightLog.unshift({date: today, kg: kg});
  if (athletes[i].weightLog.length > 60) athletes[i].weightLog = athletes[i].weightLog.slice(0, 60);
  saveAthletes(athletes);
  renderAthPanelContent();
}

function exportAthlete(id) {
  var ath = getAthletes().find(function(a){return a.id===id;});
  if (!ath) return;
  var code = 'EVIAN_ATL:' + btoa(unescape(encodeURIComponent(JSON.stringify(ath))));
  if (navigator.share) {
    navigator.share({title:'Profilo ' + ath.name, text: code})
      .catch(function(){});
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(code).then(function(){
      alert('Codice copiato negli appunti!\nIncollalo nell\'app dell\'atleta tramite "Importa".');
    });
  } else {
    prompt('Copia questo codice e invialo all\'atleta:', code);
  }
}

  if (athletes.length === 0) {

  }

  h += '<div class="ath-form-row" style="margin-bottom:16px"><label>Atleta</label><select class="ath-input" id="test-ath-sel">';
  var active = getActiveAthlete();
  athletes.forEach(function(a) {
    h += '<option value="' + a.id + '"' + (active&&active.id===a.id?' selected':'') + '>' + a.name + '</option>';
  });
  h += '</select></div>';

  ATH_LIFTS.forEach(function(l, i) {
    h += '<div class="ath-test-step">';

    h += '<div class="test-step-proto">Protocollo: <strong>' + l.reps + '</strong></div>';
    h += '<div class="test-step-note">' + l.note + '</div>';
    h += '<div class="ath-lift-inputs" style="margin-top:10px">';
    h += '<div class="ath-mini-grp"><span>kg</span><input class="ath-mini-input" id="tkg-' + l.id + '" type="number" inputmode="decimal" placeholder="0" oninput="recalcTest(\'' + l.id + '\')"></div>';
    h += '<div class="ath-mini-grp"><span>reps</span><input class="ath-mini-input" id="trp-' + l.id + '" type="number" inputmode="numeric" placeholder="0" oninput="recalcTest(\'' + l.id + '\')"></div>';
    h += '<div class="ath-1rm-display" id="t1rm-' + l.id + '">—</div>';
    h += '</div></div></div>';
  });

  h += '<button class="ath-btn-save" onclick="saveTestResults()" style="margin-top:16px;width:100%">💾 Salva tutti i risultati</button>';
  h += '</div>';
  return h;
}

function recalcTest(liftId) {
  var kg = parseFloat((document.getElementById('tkg-'+liftId)||{}).value)||0;
  var reps = parseFloat((document.getElementById('trp-'+liftId)||{}).value)||0;
  var el = document.getElementById('t1rm-'+liftId);
  var oneRM = calcOneRM(kg, reps);
  if (el) el.innerHTML = oneRM > 0 ? '<b>' + oneRM + '</b><span> 1RM</span>' : '—';
}

function saveTestResults() {
  var sel = document.getElementById('test-ath-sel');
  if (!sel || !sel.value) { alert('Seleziona un atleta'); return; }
  var athletes = getAthletes();
  var idx = athletes.findIndex(function(a){return a.id===sel.value;});
  if (idx === -1) return;
  var lifts = athletes[idx].lifts || {};
  var saved = 0;
  ATH_LIFTS.forEach(function(l) {
    var kg = parseFloat((document.getElementById('tkg-'+l.id)||{}).value)||0;
    var reps = parseFloat((document.getElementById('trp-'+l.id)||{}).value)||0;
    if (kg>0 && reps>0) {
      lifts[l.id] = {kg:kg, reps:reps, oneRM:calcOneRM(kg,reps), date:new Date().toLocaleDateString('it-IT')};
      saved++;
    }
  });
  if (saved === 0) { alert('Inserisci almeno un risultato'); return; }
  // Snapshot storico prima di sovrascrivere
  if (athletes[idx].lifts && Object.keys(athletes[idx].lifts).length > 0) {
    if (!athletes[idx].history) athletes[idx].history = [];
    athletes[idx].history.unshift({
      date: athletes[idx].lastTest || new Date().toLocaleDateString('it-IT'),
      lifts: JSON.parse(JSON.stringify(athletes[idx].lifts))
    });
    if (athletes[idx].history.length > 10) athletes[idx].history = athletes[idx].history.slice(0,10);
  }
  athletes[idx].lifts = lifts;
  athletes[idx].lastTest = new Date().toLocaleDateString('it-IT');
  saveAthletes(athletes);
  // Auto-select this athlete
  setActiveAthlete(sel.value);
  alert('✅ ' + saved + ' massimali salvati per ' + athletes[idx].name + '!');
  athCurrentTab = 'list';
  renderAthPanelContent();
}

/* ── Import ── */
function renderAthImportPanel() {
  return '<div class="ath-import">'
    + '<h3>📲 Importa profilo</h3>'
    + '<p>Ricevi il codice dal tuo coach (via WhatsApp o email) e incollalo qui sotto.</p>'
    + '<textarea class="ath-import-area" id="ath-imp-txt" placeholder="Incolla qui il codice EVIAN_ATL:..."></textarea>'
    + '<button class="ath-btn-save" onclick="doImport()" style="margin-top:12px;width:100%">📲 Importa profilo</button>'
    + '</div>';
}

function doImport() {
  var txt = (document.getElementById('ath-imp-txt').value||'').trim();
  if (!txt.startsWith('EVIAN_ATL:')) { alert('Codice non valido. Deve iniziare con EVIAN_ATL:'); return; }
  try {
    var json = decodeURIComponent(escape(atob(txt.replace('EVIAN_ATL:',''))));
    var ath = JSON.parse(json);
    ath.id = 'ath_' + Date.now();
    var athletes = getAthletes();
    athletes.push(ath);
    saveAthletes(athletes);
    setActiveAthlete(ath.id);
    athCurrentTab = 'list';
    renderAthPanelContent();
    alert('✅ Profilo di ' + ath.name + ' importato e attivato!');
  } catch(e) {
    alert('Errore nel codice. Controlla che sia stato copiato per intero.');
  }
}

/* ══════════════════════════════════════════
   BACKUP COMPLETO — EXPORT / IMPORT JSON
   ══════════════════════════════════════════ */
function exportAllData() {
  var data = {
    _version: 2,
    _date: new Date().toISOString(),
    athletes: getAthletes(),
    active_ath: localStorage.getItem('evian_active_ath') || '',
    massimali: JSON.parse(localStorage.getItem('evian_massimali') || '{}'),
    cal_events: JSON.parse(localStorage.getItem('evian_cal_events') || '[]'),
    test_log: getAthTestLog(),
  };
  var json = JSON.stringify(data, null, 2);
  var blob = new Blob([json], {type: 'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'evian-backup-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  setTimeout(function(){ URL.revokeObjectURL(url); }, 3000);
}

function importAllData() {
  var input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json,application/json';
  input.onchange = function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      try {
        var data = JSON.parse(ev.target.result);
        if (!data.athletes) throw new Error('File non valido');
        var n = data.athletes.length;
        if (!confirm('Importare backup con ' + n + ' atleti? I dati attuali verranno SOSTITUITI.')) return;
        saveAthletes(data.athletes);
        if (data.active_ath) localStorage.setItem('evian_active_ath', data.active_ath);
        if (data.massimali) localStorage.setItem('evian_massimali', JSON.stringify(data.massimali));
        if (data.cal_events) localStorage.setItem('evian_cal_events', JSON.stringify(data.cal_events));
        if (data.test_log) localStorage.setItem('evian_test_log', JSON.stringify(data.test_log));
        alert('✅ Backup importato! ' + n + ' atleti ripristinati.');
        renderAthPanelContent();
      } catch(err) {
        alert('Errore nel file: ' + err.message);
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

/* Aggiunge backup buttons al pannello import */
function renderAthImportPanel() {
  return '<div class="ath-import">'

var tbCurrentAth = '';

function getAthTestLog() {
  try { return JSON.parse(localStorage.getItem('evian_test_log') || '{}'); } catch(e) { return {}; }
}

function tbRecalc1RM(liftId) {
  var kg = parseFloat((document.getElementById('tst-kg-'+liftId)||{}).value) || 0;
  var rp = parseFloat((document.getElementById('tst-rp-'+liftId)||{}).value) || 0;
  var el = document.getElementById('tst-1rm-'+liftId);
  if (!el) return;
  var oneRM = calcOneRM(kg, rp);
  el.textContent = oneRM > 0 ? oneRM + ' kg 1RM' : '—';
  el.style.color = oneRM > 0 ? '#C41230' : '#444';
}

function saveFullTestSession() {
  var id = tbCurrentAth;
  if (!id) { alert('Seleziona un atleta prima.'); return; }
  var athletes = getAthletes();
  var idx = athletes.findIndex(function(a){ return a.id === id; });
  if (idx === -1) return;
  var today = new Date().toLocaleDateString('pt-PT');
  var ath = athletes[idx];

  // Raccolta massimali
  var newLifts = {};
  var liftsSaved = 0;
  ATH_LIFTS.forEach(function(l) {
    var kg = parseFloat((document.getElementById('tst-kg-'+l.id)||{}).value) || 0;
    var rp = parseFloat((document.getElementById('tst-rp-'+l.id)||{}).value) || 0;
    if (kg > 0 && rp > 0) {
      newLifts[l.id] = {kg:kg, reps:rp, oneRM: calcOneRM(kg,rp), date:today};
      liftsSaved++;
    }
  });

  // Raccolta test atletici
  var newFitness = {};
  var fitSaved = 0;
  TB_FITNESS_TESTS.forEach(function(t) {
    var v = parseFloat((document.getElementById('tst-fit-'+t.id)||{}).value);
    if (!isNaN(v) && v > 0) {
      newFitness[t.id] = {value:v, unit:t.unit, date:today};
      fitSaved++;
    }
  });

  if (liftsSaved === 0 && fitSaved === 0) { alert('Nessun risultato inserito.'); return; }

  // Snapshot storico
  var hasOldData = Object.keys(ath.lifts||{}).length > 0 || Object.keys(ath.fitness||{}).length > 0;
  if (hasOldData) {
    if (!ath.testHistory) ath.testHistory = [];
    ath.testHistory.unshift({
      date: ath.lastTest || today,
      lifts: JSON.parse(JSON.stringify(ath.lifts||{})),
      fitness: JSON.parse(JSON.stringify(ath.fitness||{})),
    });
    if (ath.testHistory.length > 12) ath.testHistory = ath.testHistory.slice(0,12);
    // backward compat
    if (!ath.history) ath.history = [];
    ath.history.unshift({date: ath.lastTest||today, lifts: JSON.parse(JSON.stringify(ath.lifts||{}))});
    if (ath.history.length > 10) ath.history = ath.history.slice(0,10);
  }

  // Aggiorna profilo
  if (liftsSaved > 0) athletes[idx].lifts = Object.assign({}, ath.lifts||{}, newLifts);
  if (fitSaved > 0) athletes[idx].fitness = Object.assign({}, ath.fitness||{}, newFitness);
  athletes[idx].lastTest = today;
  athletes[idx].testHistory = ath.testHistory || [];
  athletes[idx].history = ath.history || [];
  saveAthletes(athletes);
  setActiveAthlete(id);
  alert('\u2705 ' + (liftsSaved+fitSaved) + ' risultati salvati per ' + ath.name + '!');
  document.getElementById('scroll-area').innerHTML = renderTestBattery();
}

function renderTestBattery() {
  var athletes = getAthletes();
  var active = getActiveAthlete();
  if (!tbCurrentAth && active) tbCurrentAth = active.id;
  var ath = tbCurrentAth ? athletes.find(function(a){ return a.id === tbCurrentAth; }) : null;
  var lifts = ath ? (ath.lifts || {}) : {};
  var fitness = ath ? (ath.fitness || {}) : {};

  var h = '<div class="tb-wrap">';
  h += '<div class="tb-header"><div class="tb-title">Sessione di Test</div>';
  h += '<div class="tb-sub">Inserisci i risultati e salva nella scheda atleta</div></div>';

  if (athletes.length === 0) {
    h += '<div class="tb-empty-msg">Nessun atleta registrato. Creane uno prima nella sezione <strong>Agonisti</strong>.</div></div>';
    return h;
  }

  // Atleta
  h += '<div class="tb-ath-bar"><span class="tb-ath-label">Atleta:</span>';
  h += '<select class="tb-ath-sel" onchange="tbCurrentAth=this.value; document.getElementById(\'scroll-area\').innerHTML=renderTestBattery()">';
  h += '<option value="">\u2014 seleziona \u2014</option>';
  athletes.forEach(function(a){
    h += '<option value="' + a.id + '"' + (tbCurrentAth===a.id?' selected':'') + '>' + a.name + (a.weightClass?' ('+a.weightClass+')':'') + '</option>';
  });
  h += '</select></div>';

  // MASSIMALI
  h += '<div class="tb-section">';
  h += '<div class="tb-section-title"><span class="tb-section-icon">\ud83c\udfcb\ufe0f</span>Massimali</div>';
  ATH_LIFTS.forEach(function(l) {
    var last = lifts[l.id];
    h += '<div class="tb-field">';
    h += '<div class="tb-field-top"><span class="tb-field-name">' + l.name + '</span><span class="tb-field-proto">' + l.reps + '</span>';
    if (last) h += '<span class="tb-field-prev">Ult: ' + last.oneRM + ' kg &middot; ' + last.date + '</span>';
    h += '</div>';
    h += '<div class="tb-field-hint">' + l.note + '</div>';
    h += '<div class="tb-lift-row">';
    h += '<input class="tb-input-sm" id="tst-kg-' + l.id + '" type="number" inputmode="decimal" step="0.5" placeholder="kg" oninput="tbRecalc1RM(\'' + l.id + '\')">';
    h += '<span class="tb-x">&times;</span>';
    h += '<input class="tb-input-sm" id="tst-rp-' + l.id + '" type="number" inputmode="numeric" placeholder="reps" oninput="tbRecalc1RM(\'' + l.id + '\')">';
    h += '<span class="tb-1rm-badge" id="tst-1rm-' + l.id + '">&mdash;</span>';
    h += '</div></div>';
  });
  h += '</div>';

  // SALTO
  var jumpTests = ['sj','cmj','broad_jump'];
  h += '<div class="tb-section">';
  h += '<div class="tb-section-title"><span class="tb-section-icon">&#11014;</span>Salto</div>';
  jumpTests.forEach(function(tid) {
    var t = TB_FITNESS_TESTS.find(function(x){ return x.id === tid; });
    if (!t) return;
    var last = fitness[t.id];
    h += '<div class="tb-field">';
    h += '<div class="tb-field-top"><span class="tb-field-name">' + t.name + '</span><span class="tb-field-proto">' + t.unit + '</span>';
    if (last) h += '<span class="tb-field-prev">Ult: ' + last.value + ' ' + t.unit + ' &middot; ' + last.date + '</span>';
    h += '</div>';
    h += '<div class="tb-field-hint">' + t.hint + '</div>';
    h += '<div class="tb-lift-row"><input class="tb-input-lg" id="tst-fit-' + t.id + '" type="number" inputmode="decimal" step="0.1" placeholder="&mdash;">';
    h += '<span class="tb-unit-lbl">' + t.unit + '</span></div></div>';
  });
  h += '</div>';

  // VELOCIDADE
  var speedTests = ['sprint10','sprint30'];
  h += '<div class="tb-section">';
  h += '<div class="tb-section-title"><span class="tb-section-icon">&#9889;</span>Velocidade</div>';
  speedTests.forEach(function(tid) {
    var t = TB_FITNESS_TESTS.find(function(x){ return x.id === tid; });
    if (!t) return;
    var last = fitness[t.id];
    h += '<div class="tb-field">';
    h += '<div class="tb-field-top"><span class="tb-field-name">' + t.name + '</span><span class="tb-field-proto">' + t.unit + '</span>';
    if (last) h += '<span class="tb-field-prev">Ult: ' + last.value + ' ' + t.unit + ' &middot; ' + last.date + '</span>';
    h += '</div>';
    h += '<div class="tb-field-hint">' + t.hint + '</div>';
    h += '<div class="tb-lift-row"><input class="tb-input-lg" id="tst-fit-' + t.id + '" type="number" inputmode="decimal" step="0.01" placeholder="&mdash;">';
    h += '<span class="tb-unit-lbl">' + t.unit + '</span></div></div>';
  });
  h += '</div>';

  // SALVA
  if (tbCurrentAth) {
    h += '<div style="padding:0 16px 20px"><button class="tb-save-btn" onclick="saveFullTestSession()">\ud83d\udcbe Salva sessione nella scheda atleta</button></div>';
  }

  // STORICO
  if (ath && ath.testHistory && ath.testHistory.length > 0) {
    h += '<div class="tb-section">';
    h += '<div class="tb-section-title"><span class="tb-section-icon">&#128203;</span>Sessioni precedenti</div>';
    ath.testHistory.forEach(function(snap) {
      h += '<div class="tb-hist-snap"><div class="tb-hist-snap-date">' + snap.date + '</div>';
      h += '<div class="tb-hist-snap-vals">';
      if (snap.lifts) ATH_LIFTS.forEach(function(l) {
        if (snap.lifts[l.id]) h += '<span class="tb-hist-chip"><span class="tb-chip-lbl">' + l.name.split(' ')[0] + '</span><strong>' + snap.lifts[l.id].oneRM + ' kg</strong></span>';
      });
      if (snap.fitness) TB_FITNESS_TESTS.forEach(function(t) {
        if (snap.fitness[t.id]) h += '<span class="tb-hist-chip"><span class="tb-chip-lbl">' + t.name.split(' ')[0] + '</span><strong>' + snap.fitness[t.id].value + ' ' + t.unit + '</strong></span>';
      });
      h += '</div></div>';
    });
    h += '</div>';
  }

  h += '</div>';
  return h;
}
</script>
</body>
</html>
