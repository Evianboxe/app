<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Evian Boxe">
<title>Evian Boxe</title>
<style>
:root{
  --bg:#0a0a0a; --card:#141414; --card2:#1c1c1c;
  --text:#f0f0f0; --muted:#888; --border:#2a0a0a;
  --acc:#C41230; --brand:#C41230;
  --r:14px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:-apple-system,sans-serif;
  padding-bottom:calc(70px + var(--safe-bot));}
#scroll-area{padding:0 16px 24px;padding-top:16px;}

/* ── Week bar ── */
.week-bar{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.wk-label{font-size:14px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;flex-shrink:0}
.wk-pills{display:flex;gap:8px}
.wk-btn{background:var(--card2);border:1px solid #333;color:var(--muted);
  font-size:15px;font-weight:800;padding:8px 18px;border-radius:24px;cursor:pointer;transition:.15s;min-width:52px;text-align:center}
.wk-btn.active{background:var(--acc);border-color:var(--acc);color:#fff}

/* ── Header ── */
.day-header{margin-bottom:20px}
.day-header h1{font-size:30px;font-weight:900;letter-spacing:-.5px}
.day-header .sub{font-size:15px;color:var(--muted);margin-top:5px}
.session-date{font-size:14px;font-weight:600;color:var(--accent);margin-top:6px;letter-spacing:.02em;text-transform:capitalize}
.agi-date{margin:0 0 10px 0;padding:4px 10px;background:rgba(255,255,255,.06);border-radius:6px;display:inline-block}
.accent-bar{height:3px;width:40px;border-radius:2px;margin-top:10px}

/* ── Format bar ── */
.fmt-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.fmt-pill{background:var(--card2);border:1px solid var(--border);border-radius:20px;
  font-size:11px;font-weight:600;padding:4px 12px;color:var(--muted)}
.fmt-pill span{color:var(--text)}

/* ── Session toggle (Friday) ── */
.session-toggle{display:flex;background:var(--card2);border-radius:10px;
  margin-bottom:18px;overflow:hidden;border:1px solid var(--border)}
.sess-btn{flex:1;padding:9px;font-size:12px;font-weight:700;text-align:center;
  cursor:pointer;color:var(--muted);transition:.2s;border:none;background:none}
.sess-btn.active{background:var(--acc);color:#fff}

/* ── Exercise card ── */
.ex-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.ex-card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);overflow:hidden}
.ex-card-head{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer}
.ex-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;background:var(--acc);color:#fff}
.ex-name{font-size:17px;font-weight:800;flex:1}
.ex-tag{font-size:10px;font-weight:700;padding:3px 8px;border-radius:10px;
  background:rgba(255,255,255,.07);color:var(--muted)}
.ex-chevron{font-size:12px;color:var(--muted);transition:.25s}
.ex-card.open .ex-chevron{transform:rotate(180deg)}
.ex-body{display:none;padding:0 14px 14px;flex-direction:column;gap:10px}
.ex-card.open .ex-body{display:flex}
.ex-reps{font-size:26px;font-weight:900;letter-spacing:-.5px}
.ex-reps small{font-size:15px;font-weight:400;color:var(--muted)}
.ex-video{width:100%;border-radius:10px;display:block;background:#000}
.ex-note{font-size:15px;color:var(--muted);line-height:1.6;border-left:3px solid var(--border);padding-left:10px}
.ex-cue{font-size:14px;font-style:italic;color:#aaa;background:var(--card2);border-radius:8px;padding:10px 12px;margin-top:2px}
.ex-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.yt-btn{background:#ff0000;color:#fff;border:none;border-radius:8px;
  padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block}
.scale-dots{display:flex;gap:4px;align-items:center}
.scale-dot{width:8px;height:8px;border-radius:50%;background:var(--border)}
.scale-dot.on{background:var(--acc)}
.scale-label{font-size:10px;color:var(--muted);margin-left:2px}
/* Agonist block video */
.b-ex-video{width:100%;border-radius:8px;display:block;margin-top:6px;background:#000}

/* ── Neuro rounds ── */
.neuro-section{margin-bottom:20px}
.neuro-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;cursor:pointer}
.neuro-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);flex:1}
.neuro-toggle{font-size:10px;color:var(--muted);background:var(--card2);border:1px solid var(--border);
  border-radius:8px;padding:3px 9px;cursor:pointer;flex-shrink:0;transition:.15s}
.neuro-grid{display:flex;gap:6px;margin-bottom:10px}
.neuro-card{flex:1;background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:10px 6px;text-align:center;cursor:pointer;transition:.2s}
.neuro-card.active{border-color:var(--acc);background:rgba(196,18,48,.12)}
.neuro-card .nval{font-size:18px;font-weight:800}
.neuro-card .nlbl{font-size:9px;color:var(--muted);margin-top:2px}
/* Neuro detail panel */
.neuro-detail{display:none;flex-direction:column;gap:8px;margin-bottom:4px}
.neuro-detail.open{display:flex}
.neuro-g-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.neuro-g-head{display:flex;align-items:center;gap:10px;padding:10px 12px}
.neuro-g-badge{font-size:14px;font-weight:800;min-width:32px;height:32px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--acc);color:#fff}
.neuro-g-title{font-size:13px;font-weight:700;flex:1}
.neuro-g-round{font-size:10px;color:var(--muted);background:var(--card2);
  border-radius:6px;padding:2px 8px;flex-shrink:0}
.neuro-g-body{padding:0 12px 12px;display:flex;flex-direction:column;gap:6px}
.neuro-g-desc{font-size:12px;color:var(--muted);line-height:1.55}
.neuro-g-cue{font-size:11px;font-style:italic;color:#aaa;background:var(--card2);
  border-radius:7px;padding:7px 10px}
.neuro-g-ex{font-size:11px;color:var(--text);border-left:2px solid var(--acc);padding-left:8px}

/* ── Finisher ── */
.finisher-card{background:linear-gradient(135deg,#141414 0%,#200005 100%);
  border:1px solid #C41230;border-radius:14px;padding:14px 16px;margin-top:16px}
.finisher-badge{display:inline-flex;align-items:center;gap:6px;
  background:#C41230;color:#fff;font-size:10px;font-weight:800;
  text-transform:uppercase;letter-spacing:.1em;border-radius:20px;
  padding:3px 10px;margin-bottom:10px}
.finisher-title{font-size:16px;font-weight:800;margin-bottom:4px}
.finisher-sub{font-size:12px;color:#bbb;margin-bottom:10px;line-height:1.4}
.finisher-options{display:flex;flex-direction:column;gap:6px}
.finisher-opt{display:flex;align-items:center;gap:8px;font-size:12px;color:#ddd}
.finisher-opt::before{content:'→';color:#C41230;font-weight:700;flex-shrink:0}
.finisher-note{font-size:11px;color:#777;margin-top:10px;border-top:1px solid #2a2a2a;padding-top:8px;font-style:italic}

/* ── Blocks (agonist / recall) ── */
.blocks{display:flex;flex-direction:column;gap:12px;margin-bottom:20px}
.block{background:var(--card);border-radius:var(--r);border:1px solid var(--border);overflow:hidden}
.block-head{padding:10px 14px;font-size:11px;font-weight:800;text-transform:uppercase;
  letter-spacing:.1em;background:rgba(255,255,255,.03);color:var(--muted);
  cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.block-body{display:none;padding:12px 14px;gap:10px;flex-direction:column}
.block.open .block-body{display:flex}
.block-chevron{font-size:12px;color:var(--muted);transition:.25s}
.block.open .block-chevron{transform:rotate(180deg)}
.b-exercise{display:flex;flex-direction:column;gap:4px;padding-bottom:10px;
  border-bottom:1px solid var(--border)}
.b-exercise:last-child{padding-bottom:0;border-bottom:none}
.b-ex-name{font-size:14px;font-weight:700}
.b-ex-sets{font-size:18px;font-weight:800;letter-spacing:-.5px}
.b-ex-sets small{font-size:12px;font-weight:400;color:var(--muted)}
.b-ex-note{font-size:12px;color:var(--muted);line-height:1.5}
.b-ex-cue{font-size:11px;font-style:italic;color:#aaa}

/* ── RPE bar ── */
.rpe-grid{display:flex;gap:6px;margin-bottom:20px}
.rpe-item{flex:1;background:var(--card);border-radius:10px;padding:8px 6px;text-align:center}
.rpe-item .rv{font-size:18px;font-weight:800}
.rpe-item .rl{font-size:9px;color:var(--muted);margin-top:2px}

/* ── Recall table ── */
.recall-table{width:100%;border-collapse:collapse;margin-bottom:20px}
.recall-table th{font-size:11px;font-weight:700;text-align:left;padding:8px 10px;
  color:var(--muted);text-transform:uppercase;letter-spacing:.06em;
  border-bottom:1px solid var(--border)}
.recall-table td{padding:10px 10px;font-size:13px;border-bottom:1px solid var(--border)}
.recall-table td:first-child{font-weight:700}
.recall-table td:not(:first-child){color:var(--muted)}

/* ── Bottom nav ── */
#top-controls{display:flex;flex-direction:column;
  background:rgba(15,15,15,.97);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);}
.tc-week{display:flex;align-items:center;justify-content:center;gap:10px;
  padding:12px 16px 10px;border-bottom:1px solid #1a1a1a}
#bottom-nav{display:flex;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:14px 4px 12px;cursor:pointer;
  border:none;background:none;color:var(--muted);font-size:11px;font-weight:700;
  letter-spacing:.05em;text-transform:uppercase;gap:5px;transition:.15s}
.nav-btn.active{color:#E63946}
.nav-dot{width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.4;margin-top:1px}
.nav-btn.active .nav-dot{opacity:1}
.day-code{font-size:18px;font-weight:900;letter-spacing:-.3px}

/* ── WhatsApp share ── */
.share-btn{display:flex;align-items:center;gap:6px;background:#25D366;color:#fff;
  border:none;border-radius:10px;padding:7px 14px;font-size:12px;font-weight:700;
  cursor:pointer;margin-top:10px;width:100%}
.share-btn svg{width:16px;height:16px;flex-shrink:0}

/* ── Test Battery ── */
.tb-wrap{padding:0 0 100px}
.tb-header{padding:16px 16px 4px}
.tb-title{font-size:18px;font-weight:900;color:#fff;margin-bottom:2px}
.tb-sub{font-size:12px;color:#666;margin-bottom:12px}
.tb-cat-bar{display:flex;gap:6px;padding:0 16px 10px;overflow-x:auto;scrollbar-width:none}
.tb-cat-bar::-webkit-scrollbar{display:none}
.tb-cat-btn{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1.5px solid #333;background:#141414;color:#aaa;font-size:11px;font-weight:700;cursor:pointer;transition:.2s}
.tb-cat-btn.active{background:var(--acc);border-color:var(--acc);color:#fff}
.tb-ath-bar{display:flex;align-items:center;gap:8px;padding:0 16px 10px}
.tb-ath-label{font-size:12px;color:#888;flex-shrink:0}
.tb-ath-sel{flex:1;background:#141414;border:1px solid #333;color:#fff;border-radius:8px;padding:6px 10px;font-size:13px}
.tb-card{margin:0 14px 12px;background:#141414;border-radius:14px;overflow:hidden;border:1px solid #1e1e1e}
.tb-card-hdr{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;user-select:none}
.tb-cat-badge{font-size:10px;font-weight:800;letter-spacing:.06em;padding:3px 8px;border-radius:20px;text-transform:uppercase}
.tb-cat-badge.salto{background:#1a2a4a;color:#7ec8ff}
.tb-cat-badge.corrida{background:#1a3a1a;color:#6edd6e}
.tb-cat-badge.ring{background:#3a1a1a;color:#ff8080}
.tb-cat-badge.forca{background:#2a1a3a;color:#cc99ff}
.tb-card-name{flex:1;font-size:13px;font-weight:800;color:#fff}
.tb-card-unit{font-size:11px;color:#555;margin-right:6px}
.tb-last-val{font-size:13px;font-weight:700;color:var(--acc)}
.tb-chevron{font-size:11px;color:#555;transition:.2s}
.tb-card.open .tb-chevron{transform:rotate(180deg)}
.tb-body{display:none;padding:0 14px 14px;border-top:1px solid #1e1e1e}
.tb-card.open .tb-body{display:block}
.tb-desc{font-size:12px;color:#888;margin:10px 0 8px;line-height:1.5}
.tb-section-lbl{font-size:10px;font-weight:800;letter-spacing:.08em;color:#555;text-transform:uppercase;margin:12px 0 6px}
.tb-materials{list-style:disc;padding-left:16px;margin:0 0 4px}
.tb-materials li{font-size:12px;color:#aaa;margin-bottom:3px;line-height:1.4}
.tb-step{display:flex;gap:8px;margin-bottom:6px}
.tb-step-num{flex-shrink:0;width:20px;height:20px;border-radius:50%;background:var(--acc);color:#fff;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center}
.tb-step-txt{font-size:12px;color:#ccc;line-height:1.5;padding-top:2px}
.tb-norms{display:flex;flex-direction:column;gap:4px;margin:4px 0}
.tb-norm{display:flex;align-items:center;gap:8px;font-size:11px;color:#aaa}
.tb-norm-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tb-norm-range{font-weight:700;color:#fff;min-width:80px}
.tb-tip{background:#111;border-left:3px solid var(--acc);padding:8px 10px;border-radius:0 6px 6px 0;font-size:11px;color:#aaa;margin-top:8px;line-height:1.5}
.tb-record{margin-top:12px;display:flex;gap:8px;align-items:center}
.tb-record-input{flex:1;background:#0a0a0a;border:1.5px solid #333;color:#fff;border-radius:8px;padding:8px 12px;font-size:14px;font-weight:700}
.tb-record-input:focus{border-color:var(--acc);outline:none}
.tb-record-unit{font-size:11px;color:#555;flex-shrink:0}
.tb-record-btn{background:var(--acc);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0}
.tb-hist{margin-top:10px}
.tb-hist-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #1a1a1a;font-size:12px}
.tb-hist-date{color:#555}
.tb-hist-val{color:#fff;font-weight:700}
.tb-measure{font-size:12px;color:#aaa;font-style:italic;margin:4px 0 8px;line-height:1.4}
/* Backup buttons */
.backup-row{display:flex;gap:8px;margin-bottom:14px}
.bk-btn{flex:1;padding:10px;border-radius:10px;border:1.5px solid #333;font-size:12px;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:.2s}
.bk-btn.export{background:#0a1a0a;border-color:#2d5a2d;color:#6edd6e}
.bk-btn.import-bk{background:#0a0a1a;border-color:#2d2d5a;color:#7ec8ff}
.bk-btn:hover{filter:brightness(1.2)}
/* Test Battery — new form styles */
.tb-section{margin:0 14px 14px;background:#141414;border-radius:14px;overflow:hidden;border:1px solid #1e1e1e;padding:0 0 6px}
.tb-section-title{font-size:13px;font-weight:900;color:#fff;padding:12px 14px 10px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #1e1e1e;margin-bottom:4px}
.tb-section-icon{font-size:16px}
.tb-field{padding:8px 14px 4px}
.tb-field-top{display:flex;align-items:center;gap:8px;margin-bottom:2px}
.tb-field-name{font-size:13px;font-weight:800;color:#fff;flex:1}
.tb-field-proto{font-size:11px;color:#555;background:#0a0a0a;border:1px solid #222;border-radius:6px;padding:2px 7px}
.tb-field-prev{font-size:11px;color:var(--acc);font-weight:700}
.tb-field-hint{font-size:11px;color:#666;line-height:1.4;margin-bottom:6px}
.tb-lift-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.tb-input-sm{width:72px;background:#0a0a0a;border:1.5px solid #333;color:#fff;border-radius:8px;padding:7px 10px;font-size:14px;font-weight:700;text-align:center}
.tb-input-sm:focus,.tb-input-lg:focus{border-color:var(--acc);outline:none}
.tb-input-lg{width:100px;background:#0a0a0a;border:1.5px solid #333;color:#fff;border-radius:8px;padding:7px 10px;font-size:14px;font-weight:700;text-align:center}
.tb-x{font-size:14px;color:#555;font-weight:700}
.tb-unit-lbl{font-size:12px;color:#666}
.tb-1rm-badge{min-width:80px;background:#1a0005;border:1.5px solid #3a0010;color:#C41230;border-radius:8px;padding:6px 10px;font-size:12px;font-weight:800;text-align:center;transition:.2s}
.tb-save-btn{width:100%;padding:14px;background:var(--acc);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:900;cursor:pointer;letter-spacing:.02em}
.tb-save-btn:hover{background:#a30f28}
.tb-hist-snap{margin:0 14px 10px;background:#0d0d0d;border-radius:10px;padding:10px 12px;border:1px solid #1e1e1e}
.tb-hist-snap-date{font-size:11px;color:#555;font-weight:700;margin-bottom:6px}
.tb-hist-snap-vals{display:flex;flex-wrap:wrap;gap:6px}
.tb-hist-chip{display:inline-flex;align-items:center;gap:5px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;padding:3px 8px;font-size:11px}
.tb-chip-lbl{color:#666}
.tb-empty-msg{padding:40px 20px;text-align:center;color:#666;font-size:13px;line-height:1.6}

/* ── Brand logo ── */
.brand-logo{height:36px;width:36px;border-radius:50%;object-fit:cover;flex-shrink:0;border:2px solid #C41230}

/* ── Category bar ── */
#cat-bar{position:fixed;top:0;left:0;right:0;z-index:50;
  padding:calc(var(--safe-top) + 8px) 16px 8px;
  background:rgba(10,10,10,.97);backdrop-filter:blur(12px);
  border-bottom:1px solid #3a0008;display:flex;gap:6px;align-items:center}
.cat-btn{flex:1;padding:7px 10px;border-radius:10px;font-size:11px;font-weight:800;
  letter-spacing:.06em;text-transform:uppercase;cursor:pointer;
  border:1px solid var(--border);background:var(--card2);color:var(--muted);transition:.15s}
.cat-btn.active{background:var(--acc);border-color:var(--acc);color:#fff}
body{padding-top:calc(var(--safe-top) + 52px);}

/* ── U12 circuits ── */
.u12-circuit{background:var(--card);border:1px solid #7ec8ff;border-radius:14px;
  padding:14px 16px;margin-bottom:16px}
.u12-badge{display:inline-flex;align-items:center;gap:6px;
  background:#7ec8ff;color:#000;font-size:10px;font-weight:800;
  text-transform:uppercase;letter-spacing:.1em;border-radius:20px;
  padding:3px 10px;margin-bottom:10px}
.u12-title{font-size:18px;font-weight:800;margin-bottom:3px}
.u12-sub{font-size:12px;color:var(--muted);margin-bottom:12px}
.u12-fmt{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}

/* ── Mobility section ── */
.mob-header{margin-bottom:18px}
.mob-header h1{font-size:24px;font-weight:800}
.mob-header .sub{font-size:12px;color:var(--muted);margin-top:3px}
.mob-accent{height:3px;width:40px;border-radius:2px;background:#C41230;margin-top:8px}
.mob-badge{display:inline-flex;align-items:center;background:#1a0005;border:1px solid #C41230;
  border-radius:20px;font-size:10px;font-weight:700;color:#C41230;
  padding:3px 12px;margin-bottom:16px}
.mob-card{background:var(--card);border:1px solid var(--border);border-radius:12px;
  margin-bottom:10px;overflow:hidden;cursor:pointer}
.mob-card-head{display:flex;align-items:center;gap:10px;padding:12px 14px}
.mob-num{width:28px;height:28px;border-radius:8px;background:#C41230;color:#fff;
  font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mob-name{font-size:14px;font-weight:700;flex:1}
.mob-reps{font-size:11px;color:#C41230;font-weight:700;flex-shrink:0}
.mob-chevron{font-size:10px;color:var(--muted);flex-shrink:0}
.mob-card.open .mob-chevron{transform:rotate(180deg)}
.mob-body{display:none;padding:0 14px 14px;flex-direction:column;gap:6px}

/* ══════════════════════════════════════════
   RENDER AEC
   ══════════════════════════════════════════ */
function renderAEC() {
  const turma = AEC_DATA.turmas.find(t => t.id === aecTurma);
  document.documentElement.style.setProperty('--aec-color', turma.color);

  // Turma bar
  let turmaBar = '<div class="aec-turma-bar">';
  AEC_DATA.turmas.forEach(t => {
    const act = t.id === aecTurma ? ' active' : '';
    turmaBar += `<button class="aec-t-btn${act}" style="${t.id===aecTurma?'background:'+t.color+'22;border-color:'+t.color+';color:'+t.color:''}" onclick="switchAecTurma('${t.id}')">${t.label}<br><small style="font-weight:400;opacity:.7">${t.dias}</small></button>`;
  });
  turmaBar += '</div>';

  // Week bar
  let weekBar = '<div class="aec-week-bar">';
  turma.semanas.forEach(s => {
    const act = s.n === aecSem ? ' active' : '';
    weekBar += `<button class="aec-w-btn${act}" onclick="switchAecSem(${s.n})">Sem. ${s.n}<br><small style="font-size:9px;opacity:.7">${s.tema.split(' — ')[0]}</small></button>`;
  });
  weekBar += '</div>';

  const sem = turma.semanas.find(s => s.n === aecSem);

  // Bloco badge
  const blocoBadge = `<div class="aec-bloco">📚 <span>Bloco:</span> ${turma.bloco}</div>`;

  // Day tabs
  let dayTabs = '';
  if (sem.aulas.length > 1) {
    dayTabs = '<div class="aec-day-tabs">';
    sem.aulas.forEach((a, i) => {
      const act = i === aecDia ? ' active' : '';
      dayTabs += `<button class="aec-day-btn${act}" onclick="switchAecDia(${i})">${a.dia.slice(0,3).toUpperCase()}<br><small style="font-size:9px">Aula ${a.num}</small></button>`;
    });
    dayTabs += '</div>';
  }

  const aula = sem.aulas[aecDia] || sem.aulas[0];

  // Lesson card
  let card = `<div class="aec-card">
    <div class="aec-card-header">
      <div class="aec-card-title">Aula ${aula.num} — ${aula.dia}</div>
      <div class="aec-card-meta">🎯 ${aula.obj}</div>
    </div>`;

  aula.partes.forEach(p => {
    const colorMap = {'Aquecimento':'#f97316','Parte Principal':'#3b82f6','Retorno à Calma':'#10b981'};
    const c = colorMap[p.fase] || '#888';
    card += `<div class="aec-fase">
      <div><span class="aec-fase-label" style="color:${c}">${p.fase}</span><span class="aec-fase-dur">${p.dur}</span></div>`;
    if (p.atividades) {
      p.atividades.forEach(a => {
        card += `<div class="aec-ativ">
          <div><span class="aec-ativ-name">${a.nome}</span><span class="aec-ativ-dur">${a.dur}</span></div>
          <div class="aec-ativ-desc">${a.desc}</div>
        </div>`;
      });
    } else {
      card += `<div class="aec-fase-desc">${p.desc}</div>`;
    }
    card += '</div>';
  });
  card += '</div>';

  // Material
  const mat = `<div class="aec-mat"><div class="aec-mat-label">🗂 Materiais</div><div class="aec-mat-text">${aula.mat}</div></div>`;

  // Dica
  const dica = `<div class="aec-dica"><div class="aec-dica-title">💡 Dica do Professor</div><div class="aec-dica-text">${aula.dica}</div></div>`;

  return `<div class="aec-wrap">
    <div class="aec-header">
      <div class="aec-title">AEC — Atividades Físicas e Desportivas</div>
      <div class="aec-sub">Programa DGE | 45 min por aula</div>
    </div>
    ${turmaBar}${weekBar}${blocoBadge}${dayTabs}${card}${mat}${dica}
  </div>`;
}
</script>

    <span class="wk-label">Sett.</span>

      <button class="wk-btn active" onclick="switchWeek(1)">S1</button>
      <button class="wk-btn" onclick="switchWeek(2)">S2</button>
      <button class="wk-btn" onclick="switchWeek(3)">S3</button>
      <button class="wk-btn" onclick="switchWeek(4)">S4</button>
    </div>
    <button class="cal-topbar-btn" id="cal-topbar-btn" onclick="openCalPanel()">📅 Calendario</button>
    <button class="ath-topbar-btn" id="ath-topbar-btn" onclick="openAthPanel()">👤 Atleti</button>
  </div>
  <nav id="bottom-nav">
    <button class="nav-btn active" onclick="navDayClick(0)">
      <div class="day-code">LUN</div><div class="nav-dot"></div><div class="nav-done" id="nd-0"></div>
    </button>
    <button class="nav-btn" onclick="navDayClick(1)">
      <div class="day-code">MAR</div><div class="nav-dot"></div><div class="nav-done" id="nd-1"></div>

  </nav>
</div>
<div id="scroll-area"></div>
<!-- Timer FAB -->
<button id="timer-fab" onclick="toggleTimerPanel()">⏱</button>
<div id="timer-panel">
  <div class="timer-presets">
    <button class="timer-preset-btn active" onclick="setTimerPreset('circ')">💪 Circuito</button>
    <button class="timer-preset-btn" onclick="setTimerPreset('round')">🥊 Round</button>
    <button class="timer-preset-btn" onclick="setTimerPreset('custom')">⚙️ Custom</button>
  </div>
  <div class="timer-display">
    <div class="timer-phase work" id="timer-phase-lbl">LAVORO</div>
    <div class="timer-count" id="timer-count">0:40</div>
    <div class="timer-rounds" id="timer-rounds-lbl">Round 1 / 4</div>
  </div>
  <div class="timer-btns">
    <button class="timer-btn primary go" id="timer-start-btn" onclick="startPauseTimer()">▶ Start</button>
    <button class="timer-btn secondary" onclick="resetTimer()">↺ Reset</button>
  </div>
  <div class="timer-config" id="timer-config">
    <div class="timer-cfg-item">
      <div class="timer-cfg-label">Lavoro</div>
      <div class="timer-cfg-row">
        <button class="timer-cfg-btn" onclick="adjustTimer('work',-5)">−</button>
        <span class="timer-cfg-val" id="cfg-work">40s</span>
        <button class="timer-cfg-btn" onclick="adjustTimer('work',5)">+</button>
      </div>
    </div>
    <div class="timer-cfg-item">
      <div class="timer-cfg-label">Riposo</div>
      <div class="timer-cfg-row">
        <button class="timer-cfg-btn" onclick="adjustTimer('rest',-5)">−</button>
        <span class="timer-cfg-val" id="cfg-rest">20s</span>
        <button class="timer-cfg-btn" onclick="adjustTimer('rest',5)">+</button>
      </div>
    </div>
    <div class="timer-cfg-item">
      <div class="timer-cfg-label">Round</div>
      <div class="timer-cfg-row">
        <button class="timer-cfg-btn" onclick="adjustTimer('rounds',-1)">−</button>
        <span class="timer-cfg-val" id="cfg-rounds">4</span>
        <button class="timer-cfg-btn" onclick="adjustTimer('rounds',1)">+</button>
      </div>
    </div>
  </div>
</div>

<!-- Massimali FAB -->
<button id="mass-fab" onclick="openMassimali()">💪 Massimali</button>

// Date base: settimana 2 = lunedì 22 giugno 2026
const BASE_W2 = new Date(2026, 5, 22); // 22 giu 2026
const DAY_OFFSET = {lun:0, mar:1, mer:2, gio:3, ven:4};

function getSessionDate(dayKey, weekNum) {
  var msPerDay = 86400000;
  var weekOffset = (weekNum - 2) * 7;
  var dayOff = DAY_OFFSET[dayKey] || 0;
  var d = new Date(BASE_W2.getTime() + (weekOffset + dayOff) * msPerDay);
  return d.toLocaleDateString('it-IT', {weekday:'short', day:'numeric', month:'short', year:'numeric'});
}

function scalingDots(n) {
  let h = '<div class="scale-dots">';
  for (let i=1;i<=3;i++) h+=`<div class="scale-dot${i<=n?' on':''}"></div>`;
  return h + `<span class="scale-label">${['','Base','Intermedio','Avanzato'][n]}</span></div>`;
}

  el.parentElement.classList.toggle('open');

   RENDER
   ══════════════════════════════════════════ */
function weekBar() {
  const days = ['LUN','MAR','MER','GIO','VEN'];
  let h = `<div class="week-bar"><span class="wk-label">Settimana</span><div class="wk-pills">`;
  for (let i=1;i<=4;i++) {
    const active = i===currentWeek ? ' active' : '';
    h += `<button class="wk-btn${active}" onclick="switchWeek(${i})">S${i}</button>`;
  }
  return h + `</div></div>`;
}

   SHARE AS IMAGE (Web Share API → WhatsApp)

async function shareAsImage() {
  const day = DAYS[currentDay];

  // Create off-screen container
  let container = document.getElementById('share-card-container');
  if (!container) {
    container = document.createElement('div');
    container.id = 'share-card-container';
    document.body.appendChild(container);
  }
  container.innerHTML = buildShareCard(day);

  // Show share button as loading
  const btn = document.querySelector('.share-btn');
  const originalText = btn ? btn.innerHTML : '';
  if (btn) btn.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor" style="width:16px;height:16px;animation:spin 1s linear infinite"><path d="M12 2a10 10 0 0 1 10 10"/></svg> A gerar...`;

  try {
    const canvas = await html2canvas(container, {
      backgroundColor: '#0a0a0a',
      scale: 2,
      useCORS: false,
      allowTaint: false,
      logging: false
    });

    canvas.toBlob(async (blob) => {
      if (!blob) { alert('Erro ao gerar imagem'); return; }
      const dayPT  = PT_DAYS[day.name] || day.name;
      const fname  = `treino-evianboxe-${dayPT.toLowerCase().replace(/[^a-z]/g,'')}.png`;
      const file   = new File([blob], fname, { type:'image/png' });

      if (navigator.share && navigator.canShare && navigator.canShare({ files:[file] })) {
        await navigator.share({ files:[file], title:`Treino Evian Boxe — ${dayPT}` });
      } else {
        // Fallback: download or open in new tab
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = fname; a.click();
        setTimeout(() => URL.revokeObjectURL(url), 5000);
      }
      if (btn) btn.innerHTML = originalText;
    }, 'image/png');
  } catch(err) {
    console.error(err);
    alert('Erro ao gerar imagem: ' + err.message);
    if (btn) btn.innerHTML = originalText;
  }
}

function shareWhatsApp() {
  const day = DAYS[currentDay];
  const emoji = {'group':'🥊','agonist':'⚡','recall':'🔁','friday':'🥊'}[day.type] || '🥊';
  let text = `${emoji} *${day.name} — ${day.sub}*\n`;
  text += `_Settimana ${currentWeek}_\n\n`;

  if (day.type === 'group') {
    const ids = SCHED[day.key][currentWeek];
    text += `📋 45" lavoro / 15" rec · 4 round\n\n`;
    ids.forEach((id, i) => {
      const ex = DB[id];
      text += `${i+1}. *${ex.name}* (${ex.tag})\n`;
      text += `   ${ex.note}\n\n`;
    });
    text += `🔥 *Finisher:* 90" senza pausa — burpee / skip / shadow\n`;
  } else if (day.type === 'agonist') {
    day.blocks.forEach(bl => {
      text += `*${bl.label}*\n`;
      bl.exercises.forEach(ex => text += `• ${ex.name} — ${ex.sets}\n`);
      text += '\n';
    });
  } else if (day.type === 'recall') {
    text += `*Richiamo tecnico — intensità moderata*\n\n`;
    day.exercises.forEach(e => text += `• ${e.ex} — ${e.reps}\n`);
  } else if (day.type === 'friday') {
    if (fridayTab === 'group') {
      const ids = SCHED.ven[currentWeek];
      text += `📋 45" lavoro / 15" rec · 4 round\n\n`;
      ids.forEach((id, i) => {
        const ex = DB[id];
        text += `${i+1}. *${ex.name}* (${ex.tag})\n`;
      });
      text += `\n🔥 *Finisher:* 90" senza pausa\n`;
    } else {
      day.agonistBlocks.forEach(bl => {
        text += `*${bl.label}*\n`;
        bl.exercises.forEach(ex => text += `• ${ex.name} — ${ex.sets}\n`);
        text += '\n';
      });
    }
  }
  text += `\n_📱 Boxing Training App_`;
  window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
}

  var families = {};
  items.forEach(function(item) {
    var f = item.ex.family || 'other';
    if (!families[f]) families[f] = [];
    families[f].push(item);
  });
  // Find first family with 2+ members
  Object.values(families).forEach(function(group) {
    if (!pair && group.length >= 2) {
      pair = group.slice(0,2);
    }
  });
  // Fallback: lowest scaling
  if (!pair) {
    pair = items.sort(function(a,b){ return a.ex.scaling - b.ex.scaling; }).slice(0,2);
  }

  var pills = pair.map(function(item, i) {
    return '<div class="g4-pill">' +
      '<div class="g4-pill-num">' + (i+1) + '</div>' +
      '<div class="g4-pill-name">' + item.ex.name + '</div>' +
      '<div class="g4-pill-tag">' + item.ex.tag + '</div>' +
    '</div>';
  }).join('');
  return '<div class="g4-selection">' +
    '<div class="g4-header">' +
      '<span class="g4-badge">G4 — Adattamento</span>' +
      '<span class="g4-label">Stessa posizione di partenza · switch rapido su segnale</span>' +
    '</div>' +
    '<div class="g4-pills">' + pills + '</div>' +
    '<div class="g4-note">Coach varia segnale E quale dei due eseguire — transizione &lt;1s. Zero preparazione tra un esercizio e l\'altro.</div>' +
  '</div>';
}

function formatDesc(desc) {
  if (!desc) return '';
  // Split on ". " followed by capital letter or Italian capital with accents
  var parts = desc.split(/\.\s+(?=[A-ZA-ÀÈÌÒÙa-zà-ù\-–])/);
  // Also split on ". " anywhere if there are many sentences (>80 chars avg)
  if (parts.length <= 2 && desc.length > 120) {
    parts = desc.split(/\.\s+/);
  }
  parts = parts.map(function(p){ return p.replace(/\.\s*$/, '').trim(); }).filter(Boolean);
  if (parts.length <= 1) return '<div class="bx-item-desc">' + desc + '</div>';
  return '<ul class="bx-steps">' + parts.map(function(p){ return '<li>' + p + '</li>'; }).join('') + '</ul>';
}

      b.style.display = (i===1||i===3) ? 'none' : '';
    });
    document.documentElement.style.setProperty('--acc','#C41230');
    // Default to first visible day (LUN=0), unless currently on a valid day
    var d = (currentDay===1) ? 0 : currentDay;
    switchDay(d);
  }
  updateNavDots();
  window.scrollTo(0,0);
}


function switchDay(idx) {
  currentDay = idx;
  document.querySelectorAll('.nav-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
  const day = DAYS[idx];
  let html = '';
  if (day.type === 'boxing90') html = renderBoxing90(day);
  else if (day.type === 'group')   html = renderGroup(day);
  else if (day.type === 'agonist') html = renderArest(day);
  else if (day.type === 'recall')  html = renderRecall(day);
  else if (day.type === 'friday')  html = renderFriday(day);
  document.getElementById('scroll-area').innerHTML = html;
  document.documentElement.style.setProperty('--acc', day.accent);
  // Mostra pulsante massimali solo per l'agonista
  var massFab = document.getElementById('mass-fab');
  if (massFab) massFab.style.display = (day.type==='agonist'||day.type==='friday') ? 'block' : 'none';
  // In AGO mode week pills are hidden (agi has own week bar)
  var tcWeek = document.querySelector('.tc-week');
  if (tcWeek) tcWeek.style.display = (currentCat==='AGO') ? 'none' : '';
  updateNavDots();
  window.scrollTo(0,0);
}

function switchWeek(w) {
  currentWeek = w;
  document.querySelectorAll('#week-pills .wk-btn').forEach((b,i) => b.classList.toggle('active', i+1===w));
  updateNavDots();
  if (currentCat === 'U12') {
    document.getElementById('scroll-area').innerHTML = renderU12();
    window.scrollTo(0,0);
  } else if (currentCat === 'PC') {
    document.getElementById('scroll-area').innerHTML = renderPC();
    window.scrollTo(0,0);
  } else {
    switchDay(currentDay);
  }
}


function navDayClick(idx) {
  if (currentCat === 'U12') {
    if (idx === 3) u12Day = 'gio';
    else u12Day = 'mar'; // MAR(1) is the default Sub 12 day
    document.querySelectorAll('#bottom-nav .nav-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
    document.getElementById('scroll-area').innerHTML = renderU12();
    window.scrollTo(0,0);
  } else if (currentCat === 'PC') {
    document.querySelectorAll('#bottom-nav .nav-btn').forEach((b,i) => b.classList.toggle('active', i===4));
    document.getElementById('scroll-area').innerHTML = renderPC();
    window.scrollTo(0,0);
  } else if (currentCat === 'AGO') {
    // In AGO mode: MAR(1), GIO(3), VEN(4)
    var validDay = (idx===4) ? 4 : 1;
    if (idx === 4) { fridayTab = 'agonist'; }
    switchDay(validDay);
  } else {
    switchDay(idx);
  }
}
function switchFridayTab(tab) {
  fridayTab = tab;
  switchDay(currentDay); // re-render friday
}

   INIT
   ══════════════════════════════════════════ */
window.addEventListener('load', () => {
  // Auto-detect today's day and week
  const today = new Date();
  const dow = today.getDay(); // 0=Sun,1=Mon,2=Tue,3=Wed,4=Thu,5=Fri,6=Sat
  const dayIdx = [0,0,1,2,3,4,0][dow]; // Sun→LUN, Mon→LUN, Tue→MAR, Wed→MER, Thu→GIO, Fri→VEN, Sat→LUN

  // Auto-detect current week (1-4 rotation based on BASE_W2)
  const msPerWeek = 7 * 86400000;
  const diffMs = today - BASE_W2;
  if (diffMs >= 0) {
    const weekOffset = Math.floor(diffMs / msPerWeek);
    currentWeek = ((weekOffset + 1) % 4) + 1; // W2=1→1, W3=2→2, W4=3→3, W5=4→4, W6=5→1...
    document.querySelectorAll('#week-pills .wk-btn').forEach((b,i) => b.classList.toggle('active', i+1===currentWeek));
  }

  // Apply PREPUG nav (hide MAR and GIO by default)
  document.querySelectorAll('#bottom-nav .nav-btn').forEach((b,i) => {
    b.style.display = (i===1||i===3) ? 'none' : '';
  });
  var prepugDay = [0,0,2,2,4][dayIdx] ?? 0;
  switchDay(prepugDay); // PREPUG: skip MAR→LUN, GIO→MER
  updateNavDots();
  resetTimer();
  updateAthTopbarBtn();
  updateCalTopbarBtn();
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone;
  if (isIOS && !isStandalone) {
    document.getElementById('install-tip').style.display = 'flex';
  }
});

/* ══════════════════════════════════════════
   RENDER AEC
   ══════════════════════════════════════════ */
function renderAEC() {
  const turma = AEC_DATA.turmas.find(t => t.id === aecTurma);
  document.documentElement.style.setProperty('--aec-color', turma.color);

  // Turma bar
  let turmaBar = '<div class="aec-turma-bar">';
  AEC_DATA.turmas.forEach(t => {
    const act = t.id === aecTurma ? ' active' : '';
    turmaBar += `<button class="aec-t-btn${act}" style="${t.id===aecTurma?'background:'+t.color+'22;border-color:'+t.color+';color:'+t.color:''}" onclick="switchAecTurma('${t.id}')">${t.label}<br><small style="font-weight:400;opacity:.7">${t.dias}</small></button>`;
  });
  turmaBar += '</div>';

  // Week bar
  let weekBar = '<div class="aec-week-bar">';
  turma.semanas.forEach(s => {
    const act = s.n === aecSem ? ' active' : '';
    weekBar += `<button class="aec-w-btn${act}" onclick="switchAecSem(${s.n})">Sem. ${s.n}<br><small style="font-size:9px;opacity:.7">${s.tema.split(' — ')[0]}</small></button>`;
  });
  weekBar += '</div>';

  const sem = turma.semanas.find(s => s.n === aecSem);

  // Bloco badge
  const blocoBadge = `<div class="aec-bloco">📚 <span>Bloco:</span> ${turma.bloco}</div>`;

  // Day tabs
  let dayTabs = '';
  if (sem.aulas.length > 1) {
    dayTabs = '<div class="aec-day-tabs">';
    sem.aulas.forEach((a, i) => {
      const act = i === aecDia ? ' active' : '';
      dayTabs += `<button class="aec-day-btn${act}" onclick="switchAecDia(${i})">${a.dia.slice(0,3).toUpperCase()}<br><small style="font-size:9px">Aula ${a.num}</small></button>`;
    });
    dayTabs += '</div>';
  }

  const aula = sem.aulas[aecDia] || sem.aulas[0];

  // Lesson card
  let card = `<div class="aec-card">
    <div class="aec-card-header">
      <div class="aec-card-title">Aula ${aula.num} — ${aula.dia}</div>
      <div class="aec-card-meta">🎯 ${aula.obj}</div>
    </div>`;

  aula.partes.forEach(p => {
    const colorMap = {'Aquecimento':'#f97316','Parte Principal':'#3b82f6','Retorno à Calma':'#10b981'};
    const c = colorMap[p.fase] || '#888';
    card += `<div class="aec-fase">
      <div><span class="aec-fase-label" style="color:${c}">${p.fase}</span><span class="aec-fase-dur">${p.dur}</span></div>`;
    if (p.atividades) {
      p.atividades.forEach(a => {
        card += `<div class="aec-ativ">
          <div><span class="aec-ativ-name">${a.nome}</span><span class="aec-ativ-dur">${a.dur}</span></div>
          <div class="aec-ativ-desc">${a.desc}</div>
        </div>`;
      });
    } else {
      card += `<div class="aec-fase-desc">${p.desc}</div>`;
    }
    card += '</div>';
  });
  card += '</div>';

  // Material
  const mat = `<div class="aec-mat"><div class="aec-mat-label">🗂 Materiais</div><div class="aec-mat-text">${aula.mat}</div></div>`;

  // Dica
  const dica = `<div class="aec-dica"><div class="aec-dica-title">💡 Dica do Professor</div><div class="aec-dica-text">${aula.dica}</div></div>`;

  return `<div class="aec-wrap">
    <div class="aec-header">
      <div class="aec-title">AEC — Atividades Físicas e Desportivas</div>
      <div class="aec-sub">Programa DGE | 45 min por aula</div>
    </div>
    ${turmaBar}${weekBar}${blocoBadge}${dayTabs}${card}${mat}${dica}
  </div>`;
}

function switchAgiWeek(w) {
  currentWeekAgi = w;
  document.querySelectorAll(".agi-wk-btn").forEach(function(b,i){b.classList.toggle("active",i+1===w);});
  var day = DAYS[currentDay];
  var dayKey = day.type === "agonist" ? "mar" : "ven";
  var el = document.querySelector(".agi-content");
  if (el) el.innerHTML = buildAgiContent(dayKey);
}

function renderAgiWeekBar(activeW) {
  var h = "<div class=\"agi-week-bar\">";
  for (var w=1; w<=12; w++) {
    var isActive = w === activeW;
    h += "<button class=\"agi-wk-btn" + (isActive?" active":"") + "\" onclick=\"switchAgiWeek(" + w + ")\">" + w + "</button>";
  }
  return h + "</div>";
}

      return {vid: AGI_MEDIA[i][1], yt: AGI_MEDIA[i][2]};
    }
  }
  return null;
}

function buildAgiContent(dayKey) {
  var sess = AGONISTA[dayKey][currentWeekAgi];
  if (!sess) return "<div style=\"padding:20px;color:#666;\">Sessione non trovata</div>";

  var phaseColor = {1:"#1e3a5a",2:"#1e4a1e",3:"#5a1e1e",4:"#4a4a4a"}[sess.fase];
  var h = "";

  var agiDateStr = getSessionDate(dayKey, currentWeekAgi);
  h += "<div class=\"agi-fase-strip\" style=\"background:" + phaseColor + "\">" +
    sess.fase_label + " &nbsp;&middot;&nbsp; " + sess.fase_note + "</div>";
  h += "<div class=\"agi-subtitle\">" + sess.subtitle + "</div>";
  h += "<div class=\"session-date agi-date\">" + agiDateStr + "</div>";

  sess.blocks.forEach(function(blk, bi) {
    var isOpen = bi === 0;
    h += "<div class=\"agi-blk" + (isOpen?" open":"") + "\">" +
      "<div class=\"agi-blk-hdr agi-hdr-" + blk.type + "\" onclick=\"this.parentElement.classList.toggle('open')\">" +
        "<span class=\"agi-badge agi-badge-" + blk.type + "\">" + blk.type + "</span>" +
        "<span class=\"agi-blk-title\">" + blk.label + "</span>" +
        "<span class=\"agi-blk-dur\">" + blk.duration + "</span>" +
        "<span class=\"agi-blk-toggle\">&#9660;</span>" +
      "</div>" +
      "<div class=\"agi-blk-body\">";

    h += getAgiNeuroHtml(blk.type);
    h += renderWeightChips(blk, getActiveAthlete());
    if (blk.note_fase) {
      h += "<div class=\"agi-fase-note\">&#9889; " + blk.note_fase + "</div>";
    }

    h += "<div class=\"agi-ex-hdr\"><span>Esercizio</span><span>Serie&times;Rip</span><span>Rec</span></div>";

    blk.exercises.forEach(function(ex) {
      var agi_m = getAgiMedia(ex.name);
      var agi_media_html = "";
      if (agi_m) {
        if (agi_m.vid) {
          agi_media_html = "<video class=\"agi-ex-video\" autoplay loop muted playsinline><source src=\"" + agi_m.vid + "\" type=\"video/mp4\"></video>";
        } else if (agi_m.yt) {
          agi_media_html = "<a class=\"yt-btn\" href=\"https://www.youtube.com/watch?v=" + agi_m.yt + "\" target=\"_blank\">&#9654; Video</a>";
        }
      }
      h += "<div class=\"agi-ex-row\">" +
        "<div>" +
          "<div class=\"agi-ex-name\">" + ex.name + "</div>" +
          (ex.note ? "<div class=\"agi-ex-note\">" + ex.note + "</div>" : "") +
          (ex.rpe ? "<div class=\"agi-rpe\">RPE: " + ex.rpe + "</div>" : "") +
          (ex.alt ? "<div class=\"agi-ex-alt\">Alt: " + ex.alt + "</div>" : "") +
          agi_media_html +
        "</div>" +
        "<div class=\"agi-ex-sets\">" + ex.sets + "</div>" +
        "<div class=\"agi-ex-rec\">" + ex.rec + "</div>" +
      "</div>";
    });

    if (blk.blk_note) {
      h += "<div class=\"agi-blk-note\">&#128204; " + blk.blk_note + "</div>";
    }

    h += "</div></div>";
  });

  return h;
}

/* ══════════════════════════════════════════
   GENERATE CIRCUIT PDF (Treino Físico)
   ══════════════════════════════════════════ */
function generateCircuitPDF(dayKey, shareMode) {
  if (typeof window.jspdf === 'undefined') {
    alert('Biblioteca PDF não carregada. Aguarde e tente novamente.');
    return null;
  }
  var jsPDF = window.jspdf.jsPDF;
  var doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  var margin = 14;
  var pageW = doc.internal.pageSize.getWidth();
  var cw = pageW - 2 * margin;
  var y = 20;
  var lh = 5.8;
  var RED = [140, 14, 14];
  var DARK = [28, 28, 28];
  var FOOTER_Y = 290;

  var dayLabels = {lun:'Segunda-feira', mer:'Quarta-feira', ven:'Sexta-feira'};
  var dayLabel = dayLabels[dayKey] || dayKey;
  var week = currentWeek;
  var ids = SCHED[dayKey] ? SCHED[dayKey][week] : null;
  if (!ids) { alert('Dados do treino não encontrados.'); return null; }

  function newPage() { doc.addPage(); y = 18; }
  function chk(n) { if (y + n > FOOTER_Y - 4) newPage(); }

  // ── CABEÇALHO ──
  var HDR_H = 16;
  doc.setFillColor(RED[0], RED[1], RED[2]);
  doc.rect(margin, y - 7, cw, HDR_H, 'F');
  try {
    if (typeof EVIAN_LOGO_B64 !== 'undefined' && EVIAN_LOGO_B64.length > 100)
      doc.addImage('data:image/png;base64,' + EVIAN_LOGO_B64, 'PNG', margin + 2, y - 6, 11, 11);
  } catch(e) {}
  doc.setFontSize(13); doc.setFont('helvetica', 'bold'); doc.setTextColor(255,255,255);
  doc.text('EVIAN BOXE — TREINO FÍSICO', pageW / 2 + 4, y + 1, { align: 'center' });
  doc.setFontSize(8); doc.setFont('helvetica', 'normal');
  doc.text('evianboxe.pt', pageW / 2 + 4, y + 6, { align: 'center' });
  doc.setTextColor(0,0,0);
  y += HDR_H + 2;

  // Semana + dia
  doc.setFontSize(10.5); doc.setFont('helvetica', 'bold');
  doc.text('Semana ' + week + '  ·  ' + dayLabel, margin, y);
  doc.setFont('helvetica', 'normal');
  y += lh + 1;

  // Formato
  doc.setFontSize(9); doc.setTextColor(80,80,80);
  doc.text('Formato: 45" trabalho / 15" descanso  ·  4 rounds  ·  Rec. entre rounds: 90"', margin, y);
  doc.setTextColor(0,0,0);
  y += lh;

  // Linha divisória
  doc.setDrawColor(RED[0], RED[1], RED[2]); doc.setLineWidth(0.6);
  doc.line(margin, y, pageW - margin, y);
  doc.setDrawColor(0,0,0); doc.setLineWidth(0.2);
  y += 6;

  // ── PARADIGMA G1-G4 ──
  var paradigm = NEURO_PARADIGMS ? NEURO_PARADIGMS[(week - 1) % NEURO_PARADIGMS.length] : null;
  if (paradigm) {
    chk(40);
    doc.setFillColor(DARK[0], DARK[1], DARK[2]);
    doc.rect(margin, y - 3.5, cw, 10, 'F');
    doc.setFontSize(9.5); doc.setFont('helvetica', 'bold'); doc.setTextColor(255,255,255);
    doc.text('Paradigma Neurológico da Semana', margin + 2, y + 3);
    doc.setTextColor(0,0,0);
    y += 12;

    var gLabels = {'G1':'Específico','G2':'Variação','G3':'Sinal Externo','G4':'Adaptação'};
    var gW = (cw - 6) / 4;
    paradigm.forEach(function(round, ri) {
      var bx = margin + ri * (gW + 2);
      doc.setFillColor(ri === 3 ? RED[0] : 50, ri === 3 ? RED[1] : 50, ri === 3 ? RED[2] : 50);
      doc.rect(bx, y, gW, 8, 'F');
      doc.setFontSize(8.5); doc.setFont('helvetica', 'bold'); doc.setTextColor(255,255,255);
      doc.text(round.g || ('G'+(ri+1)), bx + gW/2, y + 3.5, { align: 'center' });
      doc.setFontSize(7); doc.setFont('helvetica', 'normal');
      var lbl = gLabels[round.g] || round.label || '';
      doc.text(lbl, bx + gW/2, y + 7, { align: 'center' });
      doc.setTextColor(0,0,0);
    });
    y += 12;

    // G4 instruction (most important)
    if (paradigm[3] && paradigm[3].cue) {
      chk(10);
      doc.setFontSize(8); doc.setFont('helvetica', 'italic'); doc.setTextColor(RED[0], RED[1], RED[2]);
      var cueLines = doc.splitTextToSize('G4: ' + paradigm[3].cue, cw - 4);
      cueLines.forEach(function(l){ chk(5); doc.text(l, margin+2, y); y+=4.5; });
      doc.setTextColor(0,0,0); doc.setFont('helvetica', 'normal');
    }
    y += 4;
  }

  // ── EXERCÍCIOS ──
  doc.setFillColor(DARK[0], DARK[1], DARK[2]);
  doc.rect(margin, y - 3.5, cw, 10, 'F');
  doc.setFontSize(9.5); doc.setFont('helvetica', 'bold'); doc.setTextColor(255,255,255);
  doc.text('Exercícios do Circuito  (45" · 15" descanso)', margin + 2, y + 3);
  doc.setTextColor(0,0,0);
  y += 12;

  ids.forEach(function(id, i) {
    var ex = DB[id];
    if (!ex) return;
    chk(20);

    // separator
    doc.setDrawColor(220,220,220); doc.setLineWidth(0.2);
    doc.line(margin+2, y-1, pageW-margin-2, y-1);
    doc.setDrawColor(0,0,0);

    // Number circle
    doc.setFillColor(RED[0], RED[1], RED[2]);
    doc.circle(margin + 5, y + 2, 3.5, 'F');
    doc.setFontSize(8.5); doc.setFont('helvetica', 'bold'); doc.setTextColor(255,255,255);
    doc.text(String(i+1), margin + 5, y + 3.5, { align: 'center' });
    doc.setTextColor(0,0,0);

    // Name
    doc.setFontSize(9.5); doc.setFont('helvetica', 'bold'); doc.setTextColor(20,20,20);
    var nameLines = doc.splitTextToSize(ptText(ex.name), cw * 0.65);
    nameLines.forEach(function(l, li) {
      doc.text(l, margin + 11, y + li * lh);
    });
    // Tag
    doc.setFontSize(8); doc.setFont('helvetica', 'normal'); doc.setTextColor(RED[0], RED[1], RED[2]);
    doc.text(ptText(ex.tag || ''), pageW - margin - 2, y, { align: 'right' });
    y += nameLines.length * lh + 1;

    // Note
    if (ex.note) {
      doc.setFontSize(8); doc.setFont('helvetica', 'normal'); doc.setTextColor(80,80,80);
      var noteLines = doc.splitTextToSize(ex.note, cw - 6);
      noteLines.forEach(function(l){ chk(5); doc.text(l, margin+4, y); y+=4.5; });
    }
    y += 4;
  });

  // ── FINISHER ──
  chk(22);
  doc.setFillColor(60, 0, 10);
  doc.rect(margin, y, cw, 18, 'F');
  doc.setDrawColor(RED[0], RED[1], RED[2]); doc.setLineWidth(0.8);
  doc.rect(margin, y, cw, 18);
  doc.setDrawColor(0,0,0); doc.setLineWidth(0.2);
  doc.setFontSize(9); doc.setFont('helvetica', 'bold'); doc.setTextColor(RED[0], RED[1], RED[2]);
  doc.text('FINISHER', margin + 4, y + 5);
  doc.setFontSize(11); doc.setFont('helvetica', 'bold'); doc.setTextColor(255,255,255);
  doc.text('90 segundos — sem pausa', margin + 4, y + 11);
  doc.setFontSize(8.5); doc.setFont('helvetica', 'normal'); doc.setTextColor(200,200,200);
  doc.text('Burpee  ·  Skip  ·  Shadow Boxing', margin + 4, y + 16);
  y += 22;

  // ── RODAPÉ ──
  var nPages = doc.internal.getNumberOfPages();
  for (var p = 1; p <= nPages; p++) {
    doc.setPage(p);
    doc.setFontSize(7.5); doc.setFont('helvetica','italic'); doc.setTextColor(160,160,160);
    doc.text('Evian Boxe  ·  evianboxe.pt', margin, FOOTER_Y);
    doc.text(p + ' / ' + nPages, pageW-margin, FOOTER_Y, { align:'right' });
    doc.setTextColor(0,0,0);
  }

  var baseName = 'evian-circuito-s' + week + '-' + dayKey;
  if (shareMode) return doc.output('blob');
  doc.save(baseName + '.pdf');
  return null;
}

/* ══════════════════════════════════════════
   SHARE PDF VIA WHATSAPP (Web Share API)
   ══════════════════════════════════════════ */
async function sharePDFWhatsApp(type, dayKey, btnEl) {
  var btn = btnEl || document.querySelector('.pdf-wa-btn') || document.querySelector('.share-btn');
  var origHtml = btn ? btn.innerHTML : '';
  if (btn) { btn.disabled = true; btn.textContent = 'A gerar...'; }

  try {
    var blob, baseName, week;
    if (type === 'agonist') {
      blob = generateSessionPDF(dayKey, true);
      var ath = getActiveAthlete();
      var dayCode = dayKey === 'mar' ? 'ter' : 'sex';
      week = currentWeekAgi;
      baseName = ath
        ? 'evian-' + ath.name.toLowerCase().replace(/\s+/g,'-') + '-s' + week + '-' + dayCode
        : 'evian-treino-s' + week + '-' + dayCode;
    } else {
      blob = generateCircuitPDF(dayKey, true);
      week = currentWeek;
      baseName = 'evian-circuito-s' + week + '-' + dayKey;
    }
    if (!blob) { if (btn) { btn.disabled=false; btn.innerHTML=origHtml; } return; }

    var file = new File([blob], baseName + '.pdf', { type: 'application/pdf' });
    if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({ files: [file], title: 'Treino Evian Boxe — Semana ' + week });
    } else {
      // Fallback: download
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a'); a.href = url; a.download = baseName + '.pdf'; a.click();
      setTimeout(function(){ URL.revokeObjectURL(url); }, 5000);
    }
  } catch(err) {
    if (err.name !== 'AbortError') console.error('sharePDFWhatsApp:', err);
  } finally {
    if (btn) { btn.disabled = false; btn.innerHTML = origHtml; }
  }
}

function generateSessionPDF(dayKey, shareMode) {
  if (typeof window.jspdf === 'undefined') {
    alert('Biblioteca PDF não carregada. Aguarde alguns segundos e tente novamente.');
    return null;
  }
  var jsPDF = window.jspdf.jsPDF;
  var sess = AGONISTA[dayKey][currentWeekAgi];
  if (!sess) { alert('Sessão não encontrada.'); return null; }

  var doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  var ath = getActiveAthlete();
  var margin = 14;
  var pageW = doc.internal.pageSize.getWidth();
  var pageH = 297;
  var cw = pageW - 2 * margin;
  var y = 20;
  var lh = 5.8;
  var RED = [140, 14, 14];
  var DARK = [28, 28, 28];
  var FOOTER_Y = 290;

  var dayLabel = dayKey === 'mar' ? 'Terça-feira' : 'Sexta-feira';

  function newPage() { doc.addPage(); y = 18; }
  function chk(n) { if (y + n > FOOTER_Y - 4) newPage(); }

  // Resolve XX% in sets string to computed kg using athlete's 1RM
  function resolveWeights(setsStr, oneRM) {
    if (!oneRM || !setsStr) return setsStr;
    return setsStr.replace(/(\d+(?:\.\d+)?)\s*%(?:\s*(?:1RM[^\s·→+×\n]*)?)?/g, function(match, pct) {
      return Math.round(oneRM * parseFloat(pct) / 100) + 'kg';
    });
  }

  var blockTypePT = {
    WU: 'Aquecimento', ME: 'Esforço Máximo', DE: 'Esforço Dinâmico',
    RE: 'Esforço de Repetição', ACC: 'Acessórios',
    SP: 'Especiais', ABS: 'Abdominais', MOB: 'Mobilidade'
  };

  // ── CABEÇALHO ──────────────────────────────────────────────
  var HDR_H = 16;
  doc.setFillColor(RED[0], RED[1], RED[2]);
  doc.rect(margin, y - 7, cw, HDR_H, 'F');

  // Logo
  try {
    if (typeof EVIAN_LOGO_B64 !== 'undefined' && EVIAN_LOGO_B64.length > 100) {
      doc.addImage('data:image/png;base64,' + EVIAN_LOGO_B64, 'PNG', margin + 2, y - 6, 11, 11);
    }
  } catch(e) {}

  doc.setFontSize(13); doc.setFont('helvetica', 'bold'); doc.setTextColor(255,255,255);
  doc.text('EVIAN BOXE — TREINO DE FORÇA', pageW / 2 + 4, y + 1, { align: 'center' });
  doc.setFontSize(8); doc.setFont('helvetica', 'normal');
  doc.text('evianboxe.pt', pageW / 2 + 4, y + 6, { align: 'center' });
  doc.setTextColor(0,0,0);
  y += HDR_H + 2;

  // Semana + dia
  doc.setFontSize(10.5); doc.setFont('helvetica', 'bold');
  doc.text('Semana ' + currentWeekAgi + '  ·  ' + dayLabel, margin, y);
  doc.setFont('helvetica', 'normal');
  y += lh + 1;

  // Atleta
  if (ath) {
    doc.setFontSize(9.5); doc.setTextColor(60,60,60);
    doc.text('Atleta: ' + ath.name + (ath.weightClass ? '  (' + ath.weightClass + ')' : ''), margin, y);
    doc.setTextColor(0,0,0);
    y += lh;
  }

  // Fase
  if (sess.fase_label) {
    doc.setFontSize(9); doc.setFont('helvetica', 'italic'); doc.setTextColor(100,100,100);
    var faseText = ptText(sess.fase_label) + (sess.fase_note ? ' — ' + ptText(sess.fase_note) : '');
    doc.text(faseText, margin, y);
    doc.setTextColor(0,0,0); doc.setFont('helvetica', 'normal');
    y += lh;
  }
  if (sess.subtitle) {
    doc.setFontSize(9); doc.setTextColor(80,80,80);
    doc.text(ptText(sess.subtitle), margin, y);
    doc.setTextColor(0,0,0);
    y += lh;
  }

  // Linha divisória
  doc.setDrawColor(RED[0], RED[1], RED[2]); doc.setLineWidth(0.6);
  doc.line(margin, y, pageW - margin, y);
  doc.setDrawColor(0,0,0); doc.setLineWidth(0.2);
  y += 6;

  // ── BLOCOS ────────────────────────────────────────────────
  sess.blocks.forEach(function(blk) {
    chk(20);
    var typePT = blockTypePT[blk.type] || blk.type || '';

    // Compute 1RM for this block (to resolve weight percentages in sets)
    var blkOneRM = null;
    if (ath) {
      var liftId = getBlockLift(blk.label || '');
      if (liftId) blkOneRM = getOneRM(ath, liftId);
    }

    // Cabeçalho do bloco
    doc.setFillColor(DARK[0], DARK[1], DARK[2]);
    doc.rect(margin, y - 3.5, cw, 10, 'F');
    doc.setFontSize(9.5); doc.setFont('helvetica', 'bold'); doc.setTextColor(255,255,255);
    doc.text((ptText(blk.label) || '') + (blk.duration ? '  (' + blk.duration + ')' : ''), margin + 2, y + 3);
    if (typePT) {
      doc.setFontSize(8); doc.text(typePT, pageW - margin - 2, y + 3, { align: 'right' });
    }
    doc.setTextColor(0,0,0);
    y += 12;

    // Nota de fase
    if (blk.note_fase) {
      chk(8);
      doc.setFontSize(8.5); doc.setFont('helvetica', 'italic'); doc.setTextColor(60,100,170);
      var nfLines = doc.splitTextToSize('>> ' + ptText(blk.note_fase), cw - 4);
      nfLines.forEach(function(l){ chk(5); doc.text(l, margin+2, y); y+=5; });
      doc.setTextColor(0,0,0);
      y += 1;
    }

    // Exercícios
    blk.exercises.forEach(function(ex) {
      // Estimate height needed for this exercise
      var estLines = doc.splitTextToSize('• ' + ex.name, cw * 0.60).length;
      var estH = estLines * lh + 2;
      if (ex.rec && ex.rec !== '—') estH += 5;
      if (ex.note) estH += Math.ceil(ex.note.length / 60) * 4.5 + 2;
      if (ex.rpe) estH += 5;
      var agi_m = getAgiMedia(ex.name);
      if (agi_m && (agi_m.vid || agi_m.yt)) estH += 10;
      estH += 5; // bottom padding
      chk(estH);

      // Thin separator line before each exercise (except first if right after block header)
      doc.setDrawColor(220,220,220); doc.setLineWidth(0.2);
      doc.line(margin + 2, y - 1, pageW - margin - 2, y - 1);
      doc.setDrawColor(0,0,0);

      // Resolve sets to kg values
      var setsDisplay = resolveWeights(ex.sets, blkOneRM) || (ex.sets || '');

      // Nome + séries
      doc.setFontSize(9.5); doc.setFont('helvetica', 'bold'); doc.setTextColor(20,20,20);
      var nameW = cw * 0.60;
      var nameLines = doc.splitTextToSize('• ' + ptText(ex.name), nameW);
      nameLines.forEach(function(l,i){
        doc.text(l, margin+2, y);
        if (i===0 && setsDisplay) {
          doc.setFont('helvetica','normal'); doc.setFontSize(8.5); doc.setTextColor(60,60,60);
          doc.text(setsDisplay, pageW-margin-2, y, { align:'right' });
          doc.setFont('helvetica','bold'); doc.setFontSize(9.5); doc.setTextColor(20,20,20);
        }
        y += lh;
      });

      y += 1;
      doc.setFont('helvetica','normal'); doc.setTextColor(80,80,80);

      if (ex.rec && ex.rec !== '—') {
        doc.setFontSize(8);
        doc.text('Recuperação: ' + ex.rec, margin+4, y); y += 5;
      }
      if (ex.note) {
        doc.setFontSize(8);
        var nl = doc.splitTextToSize(ptText(ex.note), cw-6);
        nl.forEach(function(l){ doc.text(l, margin+4, y); y += 4.5; });
        y += 1;
      }
      if (ex.rpe) {
        doc.setFontSize(8);
        doc.text('RPE: ' + ptText(ex.rpe), margin+4, y); y += 5;
      }
      if (ex.alt) {
        doc.setFontSize(8); doc.setFont('helvetica','italic');
        doc.text('Alternativa: ' + ptText(ex.alt), margin+4, y); y += 5;
        doc.setFont('helvetica','normal');
      }

      // Link media: GIF prioritário, YouTube como alternativa

    : 'evian-treino-s' + currentWeekAgi + '-' + dayCode;
  if (shareMode) return doc.output('blob');
  doc.save(baseName + '.pdf');
  return null;
}

function calcWeekFromFightDate(fightDateStr) {
  if (!fightDateStr) return null;
  var fightDate = new Date(fightDateStr + 'T00:00:00');
  var today = new Date(); today.setHours(0,0,0,0);
  var daysLeft = Math.ceil((fightDate - today) / (1000*60*60*24));
  if (daysLeft < 0 || daysLeft > 84) return null;
  var weeksLeft = Math.max(1, Math.ceil(daysLeft / 7));
  return Math.max(1, Math.min(12, 13 - weeksLeft));
}

function renderFightCountdown(ath) {
  if (!ath || !ath.fightDate) return '';
  var fightDate = new Date(ath.fightDate + 'T00:00:00');
  var today = new Date(); today.setHours(0,0,0,0);
  var daysLeft = Math.ceil((fightDate - today) / (1000*60*60*24));
  if (daysLeft < -1) return '';
  var week = calcWeekFromFightDate(ath.fightDate);
  var dateStr = fightDate.toLocaleDateString('it-IT', {day:'2-digit', month:'long'});
  var mainText = daysLeft <= 0 ? '⚔️ Match day!' : 'Combattimento — ' + dateStr;
  var subText = daysLeft <= 0 ? 'In bocca al lupo!' : (week ? 'Settimana ' + week + ' di 12 del programma' : 'Fuori dalla finestra — avvia il programma');
  var daysDisplay = Math.max(0, daysLeft);

    '<div class="fight-countdown-icon">🥊</div>' +
    '<div class="fight-countdown-text">' +

}

var timerWork = 40, timerRest = 20, timerTotalRounds = 4;
var timerSeconds = 40, timerPhase = 'work', timerRound = 1;
var timerRunning = false, timerInterval = null;
var timerPreset = 'circ';

function toggleTimerPanel() {
  document.getElementById('timer-panel').classList.toggle('open');
}

function setTimerPreset(p) {
  timerPreset = p;
  document.querySelectorAll('.timer-preset-btn').forEach(function(b,i){
    b.classList.toggle('active', ['circ','round','custom'][i]===p);
  });
  if (p==='circ')  { timerWork=40;  timerRest=20;  timerTotalRounds=4; }
  if (p==='round') { timerWork=180; timerRest=60;  timerTotalRounds=3; }
  resetTimer();
}

function adjustTimer(field, delta) {
  if (field==='work')   timerWork   = Math.max(5,  timerWork+delta);
  if (field==='rest')   timerRest   = Math.max(5,  timerRest+delta);
  if (field==='rounds') timerTotalRounds = Math.max(1, timerTotalRounds+delta);
  document.getElementById('cfg-work').textContent   = timerWork<60 ? timerWork+'s' : Math.floor(timerWork/60)+':'+(timerWork%60<10?'0':'')+timerWork%60;
  document.getElementById('cfg-rest').textContent   = timerRest+'s';
  document.getElementById('cfg-rounds').textContent = timerTotalRounds;
  if (!timerRunning) { timerSeconds = timerPhase==='work' ? timerWork : timerRest; updateTimerDisplay(); }
}

function startPauseTimer() {
  if (timerRunning) {
    clearInterval(timerInterval);
    timerRunning = false;
    document.getElementById('timer-start-btn').textContent = '▶ Start';
    document.getElementById('timer-fab').classList.remove('running');
  } else {
    timerRunning = true;
    document.getElementById('timer-start-btn').textContent = '⏸ Pausa';
    document.getElementById('timer-fab').classList.add('running');
    timerInterval = setInterval(function(){
      timerSeconds--;
      if (timerSeconds <= 0) {
        timerBeep();
        if (navigator.vibrate) navigator.vibrate([200,100,200]);
        if (timerPhase === 'work') {
          timerPhase = 'rest'; timerSeconds = timerRest;
        } else {
          timerRound++;
          if (timerRound > timerTotalRounds) {
            clearInterval(timerInterval); timerRunning = false;
            timerRound = timerTotalRounds;
            document.getElementById('timer-start-btn').textContent = '▶ Start';
            document.getElementById('timer-fab').classList.remove('running');
            if (navigator.vibrate) navigator.vibrate([400,200,400,200,400]);
            return;
          }
          timerPhase = 'work'; timerSeconds = timerWork;
        }
      }
      updateTimerDisplay();
    }, 1000);
  }
}

function resetTimer() {
  clearInterval(timerInterval); timerRunning = false;
  timerPhase = 'work'; timerRound = 1; timerSeconds = timerWork;
  document.getElementById('timer-start-btn').textContent = '▶ Start';
  document.getElementById('timer-fab').classList.remove('running');
  document.getElementById('cfg-work').textContent   = timerWork<60 ? timerWork+'s' : Math.floor(timerWork/60)+':'+(timerWork%60<10?'0':'')+timerWork%60;
  document.getElementById('cfg-rest').textContent   = timerRest+'s';
  document.getElementById('cfg-rounds').textContent = timerTotalRounds;
  updateTimerDisplay();
}

function updateTimerDisplay() {
  var m = Math.floor(timerSeconds/60), s = timerSeconds%60;
  document.getElementById('timer-count').textContent = m>0 ? m+':'+(s<10?'0':'')+s : timerSeconds+'';
  var ph = document.getElementById('timer-phase-lbl');
  ph.textContent = timerPhase==='work' ? 'LAVORO' : 'RIPOSO';
  ph.className = 'timer-phase ' + timerPhase;
  document.getElementById('timer-rounds-lbl').textContent = 'Round '+timerRound+' / '+timerTotalRounds;
}

function timerBeep(freq, dur) {
  freq = freq||880; dur = dur||0.15;
  try {
    var ctx = new (window.AudioContext||window.webkitAudioContext)();
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+dur);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime+dur);
  } catch(e) {}
}

}

  var d = new Date(dateStr + 'T00:00:00');
  var today = new Date(); today.setHours(0,0,0,0);
  return Math.ceil((d - today) / (1000*60*60*24));

function renderCalPanelContent() {
  var events = getCalEvents();
  var today = new Date(); today.setHours(0,0,0,0);
  events.sort(function(a,b){ return a.date < b.date ? -1 : 1; });
  var upcoming = events.filter(function(e){ return new Date(e.date+'T00:00:00') >= today; });
  var past = events.filter(function(e){ return new Date(e.date+'T00:00:00') < today; });

  var h = '';

  // Upcoming events
  h += '<div class="cal-section">';
  h += '<div class="cal-section-title">📆 Prossimi eventi</div>';
  if (upcoming.length === 0 && calEditId === null) {
    h += '<div style="color:#555;font-size:13px;padding:10px 0">Nessun evento programmato. Aggiungi il tuo prossimo combattimento o una scadenza.</div>';
  }
  upcoming.forEach(function(ev) {
    var t = CAL_TYPES[ev.type] || CAL_TYPES.fight;
    var days = daysFromNow(ev.date);
    var dayStr = days === 0 ? 'Oggi' : days === 1 ? 'Domani' : 'tra ' + days + ' giorni';
    h += '<div class="cal-event-card ' + t.cls + '">';
    h += '<div class="cal-event-icon">' + t.icon + '</div>';
    h += '<div style="flex:1;min-width:0">';
    h += '<div class="cal-event-title">' + ev.title + '</div>';
    h += '<div class="cal-event-date">' + formatCalDate(ev.date) + ' · ' + dayStr + '</div>';
    if (ev.notes) h += '<div class="cal-event-notes">' + ev.notes + '</div>';
    h += '</div>';
    h += '<button class="cal-event-delete" onclick="deleteCalEvent(\'' + ev.id + '\')">✕</button>';
    h += '</div>';
  });
  h += '</div>';

  // Add form or button
  if (calEditId !== null) {
    h += renderCalForm(calEditId);
  } else {
    h += '<button class="cal-add-btn" onclick="startCalEdit(\'new\')">+ Aggiungi evento</button>';
  }

  // Past events
  if (past.length > 0) {
    h += '<div class="cal-section" style="margin-top:24px">';
    h += '<div class="cal-section-title" style="color:#333">📁 Passati</div>';
    past.slice().reverse().forEach(function(ev) {
      var t = CAL_TYPES[ev.type] || CAL_TYPES.fight;
      h += '<div class="cal-event-card ' + t.cls + '" style="opacity:.4">';
      h += '<div class="cal-event-icon">' + t.icon + '</div>';
      h += '<div style="flex:1;min-width:0">';
      h += '<div class="cal-event-title">' + ev.title + '</div>';
      h += '<div class="cal-event-date">' + formatCalDate(ev.date) + '</div>';
      h += '</div>';
      h += '<button class="cal-event-delete" onclick="deleteCalEvent(\'' + ev.id + '\')">✕</button>';
      h += '</div>';
    });
    h += '</div>';
  }

  document.getElementById('cal-panel-content').innerHTML = h;
  updateCalTopbarBtn();
}

function renderCalForm(id) {
  var isNew = id === 'new';
  var ev = isNew ? {title:'',date:'',type:'fight',notes:''} : (getCalEvents().find(function(e){return e.id===id;})||{title:'',date:'',type:'fight',notes:''});
  var today = new Date().toISOString().split('T')[0];
  var h = '<div class="cal-form">';
  h += '<h3>' + (isNew ? '➕ Nuovo evento' : '✏️ Modifica evento') + '</h3>';
  h += '<div class="cal-form-row"><label>Titolo</label><input class="cal-input" id="cal-ftitle" value="' + (ev.title||'') + '" placeholder="Es. Torneo Nacional Sub-18"></div>';
  h += '<div class="cal-form-row"><label>Data</label><input class="cal-input" id="cal-fdate" type="date" value="' + (ev.date||today) + '" style="color-scheme:dark"></div>';
  h += '<div class="cal-form-row"><label>Tipo</label><select class="cal-select" id="cal-ftype">';
  Object.keys(CAL_TYPES).forEach(function(k) {
    h += '<option value="' + k + '"' + (ev.type===k?' selected':'') + '>' + CAL_TYPES[k].icon + ' ' + CAL_TYPES[k].label + '</option>';
  });
  h += '</select></div>';
  h += '<div class="cal-form-row"><label>Note (opzionale)</label><input class="cal-input" id="cal-fnotes" value="' + (ev.notes||'') + '" placeholder="Es. Scadenza iscrizione 5 giorni prima"></div>';
  h += '<div class="cal-form-btns"><button class="cal-btn-save" onclick="saveCalEvent(\'' + id + '\')">💾 Salva</button><button class="cal-btn-cancel" onclick="calEditId=null;renderCalPanelContent()">Annulla</button></div>';
  h += '</div>';
  return h;
}

function startCalEdit(id) {
  calEditId = id;
  renderCalPanelContent();
}

function saveCalEvent(id) {
  var title = (document.getElementById('cal-ftitle')||{}).value || '';
  var date  = (document.getElementById('cal-fdate') ||{}).value || '';
  var type  = (document.getElementById('cal-ftype') ||{}).value || 'fight';
  var notes = (document.getElementById('cal-fnotes')||{}).value || '';
  if (!title.trim() || !date) { alert('Inserisci titolo e data'); return; }
  var events = getCalEvents();
  if (id === 'new') {
    events.push({id:'ev_'+Date.now(), title:title.trim(), date:date, type:type, notes:notes.trim()});
  } else {
    var i = events.findIndex(function(e){return e.id===id;});
    if (i !== -1) events[i] = {id:id, title:title.trim(), date:date, type:type, notes:notes.trim()};
  }
  saveCalEvents(events);
  calEditId = null;
  renderCalPanelContent();
}

function deleteCalEvent(id) {
  if (!confirm('Eliminare questo evento?')) return;
  saveCalEvents(getCalEvents().filter(function(e){return e.id!==id;}));
  renderCalPanelContent();
}

function updateCalTopbarBtn() {
  var btn = document.getElementById('cal-topbar-btn');
  if (!btn) return;
  var today = new Date(); today.setHours(0,0,0,0);
  var upcoming = getCalEvents().filter(function(e){ return new Date(e.date+'T00:00:00') >= today; });
  btn.classList.toggle('has-events', upcoming.length > 0);
  btn.textContent = upcoming.length > 0 ? '📅 ' + upcoming.length : '📅 Calendario';
}

/* Block → lift mapping */
function getBlockLift(blockLabel) {
  if (!blockLabel) return null;
  var lbl = blockLabel.toLowerCase();
  if (lbl.indexOf('box squat') !== -1 || lbl.indexOf('squat') !== -1) return 'box-squat';
  if (lbl.indexOf('floor press') !== -1 || lbl.indexOf('press') !== -1) return 'floor-press';
  if (lbl.indexOf('trap bar') !== -1 || lbl.indexOf('stacco') !== -1) return 'trap-bar-dl';
  if (lbl.indexOf('romanian') !== -1 || lbl.indexOf('rdl') !== -1) return 'rdl';
  if (lbl.indexOf('chin') !== -1 || lbl.indexOf('trazioni') !== -1 || lbl.indexOf('pull') !== -1) return 'chin-up';
  return null;
}

function getOneRM(athlete, liftId) {
  if (!athlete || !athlete.lifts || !athlete.lifts[liftId]) return 0;
  return athlete.lifts[liftId].oneRM || 0;
}

function renderWeightChips(block, athlete) {
  if (!athlete) return '';
  var liftId = getBlockLift(block.label || '');
  if (!liftId) return '';
  var oneRM = getOneRM(athlete, liftId);
  if (!oneRM) return '<div class="w-chip-row"><span class="w-chip-empty">Nessun massimale per questo esercizio — vai su Atleti → Test</span></div>';

  var zones;
  if (block.type === 'ME') zones = [{p:97,l:'97%'},{p:90,l:'90%'},{p:85,l:'85%'}];
  else if (block.type === 'DE') zones = [{p:65,l:'65%'},{p:60,l:'60%'},{p:55,l:'55%'}];
  else if (block.type === 'RE') zones = [{p:75,l:'75%'},{p:70,l:'70%'}];
  else return '';

  var h = '<div class="w-chip-row"><span class="w-chip-label">⚖️ ' + athlete.name + ':</span>';
  zones.forEach(function(z) {
    h += '<span class="w-chip">' + z.l + ' = <b>' + Math.round(oneRM * z.p / 100) + ' kg</b></span>';
  });
  var threeRM = Math.round(oneRM * 0.93);
  h += '<span class="w-chip-1rm">1RM: ' + oneRM + ' kg · 3RM≈' + threeRM + ' kg</span></div>';
  return h;
}

function renderAthWeightBar() {
  var athletes = getAthletes();
  var active = getActiveAthlete();
  if (athletes.length === 0) {
    return '<div class="ath-weight-bar empty"><span>Nessun atleta registrato — </span>'
      + '<button onclick="openAthPanel()">+ Aggiungi profilo</button></div>';
  }
  var h = '<div class="ath-weight-bar"><span class="awb-label">👤 Atleta:</span>';
  h += '<select class="awb-select" onchange="setActiveAthlete(this.value)">';
  h += '<option value="">— nessuno —</option>';
  athletes.forEach(function(a) {
    var sel = active && active.id === a.id ? ' selected' : '';
    h += '<option value="' + a.id + '"' + sel + '>' + a.name + (a.weightClass ? ' (' + a.weightClass + ')' : '') + '</option>';
  });
  h += '</select><button class="awb-edit" onclick="openAthPanel()" title="Gestisci atleti">⚙️</button></div>';
  return h;
}

/* ── Athlete Panel ── */
var athCurrentTab = 'list';
var athEditId = null;

function openAthPanel() {

}

function showAthTab(tab) {

/* ── Athlete List ── */
function renderAthList() {
  var athletes = getAthletes();
  var active = getActiveAthlete();
  var h = '<div class="ath-list">';
  if (athletes.length === 0) {
    h += '<div class="ath-empty">Nessun atleta ancora.<br>Aggiungi il primo profilo qui sotto.</div>';
  } else {
    athletes.forEach(function(a) {
      var chips = ATH_LIFTS.map(function(l) {
        var lft = a.lifts && a.lifts[l.id];
        return lft && lft.oneRM ? '<span class="ath-max-chip">' + l.name.split(' ')[0] + ': ' + lft.oneRM + 'kg <span style="color:#555;font-size:10px">· 3RM ' + Math.round(lft.oneRM*0.93) + '</span></span>' : null;
      }).filter(Boolean).join('');
      var isActive = active && active.id === a.id;
      h += '<div class="ath-card' + (isActive?' ath-card-active':'') + '">';
      h += '<div class="ath-card-header">';
      h += '<div onclick="setActiveAthlete(\'' + a.id + '\')" style="cursor:pointer;flex:1">';
      h += '<div class="ath-card-name">' + (isActive?'✅ ':'') + a.name + '</div>';
      h += '<div class="ath-card-meta">' + (a.weightClass?a.weightClass+' · ':'') + (a.lastTest?'Ultimo test: '+a.lastTest:'nessun test') + '</div>';
      h += '</div>';
      h += '<div class="ath-card-btns">';
      h += '<button class="ath-icon-btn" onclick="exportAthlete(\'' + a.id + '\')" title="Esporta profilo">📤</button>';
      h += '<button class="ath-icon-btn" onclick="startEditAthlete(\'' + a.id + '\')" title="Modifica">✏️</button>';
      h += '<button class="ath-icon-btn danger" onclick="deleteAthlete(\'' + a.id + '\')" title="Elimina">🗑️</button>';
      h += '</div></div>';
      if (chips) {
        h += '<div class="ath-maxes">' + chips + '</div>';
      } else {
        h += '<div class="ath-no-maxes">Nessun massimale — esegui il test per calcolare i pesi</div>';
      }
      // Retest reminder
      var daysAgo = daysSinceTest(a.lastTest);
      if (daysAgo !== null && daysAgo >= 35) {
        h += '<div class="ath-retest-badge">⏰ Último teste há ' + daysAgo + ' dias — considera refazer</div>';
      }
      // Weight section
      var wl = a.weightLog || [];
      var latestW = wl.length > 0 ? wl[0] : null;
      var prevW = wl.length > 1 ? wl[1] : null;
      h += '<div class="ath-weight-section">';
      if (latestW) {
        var trendDelta = prevW ? Math.round((latestW.kg - prevW.kg)*10)/10 : null;
        var distTarget = (a.targetWeight && latestW) ? Math.round((latestW.kg - a.targetWeight)*10)/10 : null;
        h += '<div class="ath-weight-current">' + latestW.kg + ' <span style="font-size:13px;font-weight:400;color:#666">kg';
        if (trendDelta !== null) {
          var tCls = trendDelta <= 0 ? 'ath-wtrend-dn' : 'ath-wtrend-up';
          h += '  <span class="' + tCls + '">' + (trendDelta > 0 ? '+' : '') + trendDelta + '</span>';
        }
        h += '</span></div>';
        if (distTarget !== null) {
          var dCls = distTarget <= 1 ? 'ok' : 'warn';
          var dStr = distTarget > 0 ? '−' + distTarget + ' kg para o corte' : '✅ Dentro do limite';
          h += '<div class="ath-weight-target">Objetivo: <b>' + a.targetWeight + ' kg</b><span class="ath-weight-delta ' + dCls + '">' + dStr + '</span></div>';
        }
        // Last 5 entries
        h += '<div style="margin-top:8px">';
        wl.slice(0, 5).forEach(function(e, idx) {
          var prevE = wl[idx+1];
          var delta = prevE ? Math.round((e.kg - prevE.kg)*10)/10 : null;
          var dStr = delta !== null ? (' <span class="' + (delta<=0?'ath-wtrend-dn':'ath-wtrend-up') + '">' + (delta>0?'+':'') + delta + '</span>') : '';
          h += '<div class="ath-weight-hist-row"><span class="ath-weight-hist-date">' + e.date + '</span><span class="ath-weight-hist-kg">' + e.kg + ' kg' + dStr + '</span></div>';
        });
        h += '</div>';
      } else {
        h += '<div style="font-size:12px;color:#555;padding:4px 0">Nenhum peso registado ainda</div>';
      }
      // Quick log input
      h += '<div class="ath-weight-log-input">';
      h += '<input type="number" inputmode="decimal" step="0.1" placeholder="kg hoje" id="wlog-' + a.id + '" onkeydown="if(event.key===\'Enter\'){var v=this.value;addWeightLog(\'' + a.id + '\',v)}">';
      h += '<button onclick="var v=document.getElementById(\'wlog-' + a.id + '\').value;addWeightLog(\'' + a.id + '\',v)">+ Registar</button>';
      h += '</div></div>';
      // Storico test
      if (a.history && a.history.length > 0) {
        h += '<details class="ath-history"><summary>📈 Storico test (' + a.history.length + ')</summary><div class="ath-hist-list">';
        a.history.forEach(function(snap) {
          var snapChips = ATH_LIFTS.map(function(l) {
            var lft = snap.lifts && snap.lifts[l.id];
            return lft && lft.oneRM ? '<span class="ath-hist-chip">' + l.name.split(' ')[0] + ': ' + lft.oneRM + 'kg</span>' : null;
          }).filter(Boolean).join('');
          h += '<div class="ath-hist-row"><span class="ath-hist-date">' + snap.date + '</span><div class="ath-hist-vals">' + snapChips + '</div></div>';
        });
        h += '</div></details>';
      }
      h += '</div>';
    });
  }

  if (athEditId !== null) {
    h += renderAthForm(athEditId);
  } else {
    h += '<button class="ath-add-btn" onclick="startEditAthlete(\'new\')">+ Nuovo atleta</button>';
  }
  h += '</div>';
  return h;
}

  renderAthPanelContent();
}

  var h = '<div class="ath-form">';
  h += '<h3>' + (isNew ? '➕ Nuovo atleta' : '✏️ Modifica — ' + ath.name) + '</h3>';

  h += '<div class="ath-form-section">⚖️ Peso corporal</div>';
  h += '<div class="ath-form-row"><label>Peso objetivo para o combate (kg)</label><input class="ath-input" id="ath-ftarget" type="number" inputmode="decimal" step="0.1" value="' + (ath.targetWeight||'') + '" placeholder="Ex: 74.5"><div style="font-size:11px;color:#555;margin-top:4px">Peso alvo ao entrar na balança — abaixo do limite da categoria</div></div>';
  h += '<div class="ath-form-section">Massimali attuali (opzionale)</div>';

  ATH_LIFTS.forEach(function(l) {

    h += '<div class="ath-lift-row">';

    h += '<div class="ath-lift-inputs">';

    h += '<div class="ath-mini-grp"><span>reps</span><input class="ath-mini-input" id="afrp-' + l.id + '" type="number" inputmode="numeric" value="' + (lft.reps||'') + '" oninput="recalcAthForm(\'' + l.id + '\')"></div>';
    h += '<div class="ath-1rm-display" id="af1rm-' + l.id + '">' + (lft.oneRM?'<b>'+lft.oneRM+'</b><span> 1RM</span>':'—') + '</div>';

  });
  h += '<div class="ath-form-btns"><button class="ath-btn-save" onclick="saveAthForm(\'' + id + '\')">💾 Salva</button><button class="ath-btn-cancel" onclick="athEditId=null;renderAthPanelContent()">Annulla</button></div>';
